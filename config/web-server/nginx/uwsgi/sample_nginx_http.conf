# =============================================================================
# Domain Sample (HTTP only) — uWSGI 백엔드
# 서버 사양: 8 vCPU / 8 GB RAM
# 백엔드  : uWSGI (Django/Flask 등)
# 사용법  : nginx_http_conf.sh 가 본 파일의 토큰을 sed 치환하여
#           conf.d/{filename}_uwsgi_ng_http.conf 로 출력한다.
#           (HTTPS 버전은 sample_nginx_https.conf + nginx_https_conf.sh)
# 토큰    : portnumber, domain, webroot, appname, serviceport, filename
# =============================================================================

server {
    listen          portnumber;
    server_name     domain www.domain;

    # client_max_body_size 100M;

    # ---- 악성 봇 / DDoS 차단 (nginx-ultimate-bad-bot-blocker) ---------------
    # server 컨텍스트에 들어가는 ngxblocker 파일은 다음 2개뿐이다:
    #   · blockbots.conf : server-level `if ($bad_bot)` 검사 + 444 return
    #   · ddos.conf      : server-level limit_conn / limit_req directive (봇만 적용)
    # 나머지 bots.d/{whitelist,blacklist,bad-referrer,custom-bad-referrers}*.conf 는
    # globalblacklist.conf 가 http 컨텍스트 안의 map/geo 블록에서 자동으로 include
    # 한다. server 블록에 직접 include 하면 운영자가 항목을 추가하는 순간
    # `nginx -t` 가 실패하므로 절대 두지 말 것.
    # 자동 갱신: 컨테이너 안 cron 이 6시간마다 update-ngxblocker 실행
    include /etc/nginx/bots.d/blockbots.conf;
    include /etc/nginx/bots.d/ddos.conf;

    # ---- 보안 헤더 (HTTP 환경) ----------------------------------------------
    add_header Content-Security-Policy "frame-ancestors 'self';" always;
    add_header X-Content-Type-Options  "nosniff" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ---- 로그 ----------------------------------------------------------------
    access_log /log/nginx/filename.uwsgi_http_access.log main buffer=32k flush=5s;
    error_log  /log/nginx/filename.uwsgi_http_error.log  warn;

    # ---- 정적 자원 (Django/Flask media) --------------------------------------
    location /media/ {
        alias       /www/webroot/media/;
        autoindex   off;
        access_log  off;
        expires     30d;
        add_header  Cache-Control "public, max-age=2592000";

        location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
            expires     max;
            add_header  Cache-Control "public, max-age=31536000, immutable";
            access_log  off;
        }
    }

    # ---- 정적 자원 (Django/Flask static) -------------------------------------
    location /static/ {
        alias       /www/webroot/static/;
        autoindex   off;
        access_log  off;
        expires     max;
        add_header  Cache-Control "public, max-age=31536000, immutable";

        location ~* \.(woff|woff2|ttf|eot)$ {
            add_header  Access-Control-Allow-Origin "*";
            add_header  Cache-Control "public, max-age=31536000, immutable";
            expires     max;
            access_log  off;
        }
    }

    # ---- ACME 챌린지 ---------------------------------------------------------
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root         /www/certbot;
        try_files    $uri =404;
    }

    # ---- 메인 애플리케이션 (uWSGI) -------------------------------------------
    location / {
        autoindex off;

        # 프로젝트 정책: 글로벌 rate-limit 비활성 (ngxblocker 가 봇 전용 쓰로틀링 담당).
        # 도메인 단위 throttle 이 필요하면 해당 도메인 conf.d 파일 안에 고유 이름의
        # limit_conn_zone / limit_req_zone 을 정의한 뒤 location 에서만 호출하라.

        limit_except GET POST HEAD OPTIONS PUT DELETE PATCH {
            deny all;
        }

        # uWSGI 표준 파라미터 (REQUEST_METHOD, PATH_INFO 등)
        include /etc/nginx/uwsgi_params;

        uwsgi_pass appname:serviceport;

        # ----- 타임아웃 -------------------------------------------------------
        uwsgi_connect_timeout       60s;
        uwsgi_send_timeout          60s;
        uwsgi_read_timeout          60s;

        # ----- 버퍼 (8GB 환경 적정값; 과거 410MB는 OOM 위험으로 축소) ----------
        uwsgi_buffering             on;
        uwsgi_buffer_size           16k;
        uwsgi_buffers               16 16k;          # 256KB 총량
        uwsgi_busy_buffers_size     32k;
        uwsgi_temp_file_write_size  32k;
        uwsgi_max_temp_file_size    1024m;

        uwsgi_ignore_client_abort   on;
    }

    # ---- 보안 차단 ----------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(log|binary|pem|enc|crt|conf|cnf|sql|sh|key|yml|yaml|toml|ini|env|lock|bak|backup|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* (composer\.(json|lock|phar)|package(-lock)?\.json|yarn\.lock|requirements\.txt|Pipfile(\.lock)?|pyproject\.toml|poetry\.lock|gulpfile\.js|gruntfile\.js|phpunit\.xml|artisan)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log    off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log    off;
        allow all;
    }
}
