# ===============================================
# Production Level Nginx Configuration for uWSGI (HTTP-Only Template)
# 서버 사양: 쿼드코어 CPU, 4GB RAM, ~50 req/s
# 백엔드: uWSGI + Django/Flask Python Web Application
# ===============================================
#
# nginx_http_conf.sh 가 placeholder(webroot / portnumber / domain / appname / serviceport / filename)를
# 치환하여 conf.d/<filename>_uwsgi_ng_http.conf 로 생성한다. (HTTPS 버전은 sample_nginx_https.conf / nginx_https_conf.sh)

# HTTP 서버 블록 - 메인 uWSGI 애플리케이션
# 주의: SSL/TLS 암호화 없음, 프로덕션은 sample_nginx_https.conf 권장
server {
    listen       portnumber;
    server_name  domain www.domain;

    # 악성 봇/스캐너 차단 — nginx-ultimate-bad-bot-blocker (mitchellkrogza) 사용.
    #   blockbots.conf : User-Agent / Referrer / Bad-IP 매칭 시 444 종료
    #   ddos.conf      : 비정상 다량 요청 차단
    # 차단 리스트는 cron(/usr/local/sbin/update-ngxblocker) 으로 6시간마다 갱신된다.
    include /etc/nginx/bots.d/blockbots.conf;
    include /etc/nginx/bots.d/ddos.conf;
    # ===== 보안 헤더 (HTTP 환경에서 유효한 것만; HSTS 는 HTTPS 전용이라 제외) =====
    add_header Content-Security-Policy "frame-ancestors 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===== 성능 최적화 =====
    client_max_body_size 50M;                                       # 백엔드 업로드 한도와 일치시킬 것
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ===== 로깅 (영속 경로 /log/nginx/; 'main' 포맷은 nginx.conf 정의) =====
    access_log /log/nginx/filename.com.uwsgi_access_http.log main buffer=32k flush=5s;
    error_log  /log/nginx/filename.com.uwsgi_error_http.log warn;

    # ===== 정적 파일 처리 (Django: STATIC_ROOT=/www/webroot/static, MEDIA_ROOT=/www/webroot/media) =====
    location /media {
        autoindex off;
        alias /www/webroot/media;
        gzip_static on;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }
        access_log off;
    }
    location /static {
        autoindex off;
        alias /www/webroot/static;
        gzip_static on;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        location ~* \.(css|js)$ {
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }
        location ~* \.(woff|woff2|ttf|eot)$ {
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
            access_log off;
        }
        access_log off;
    }

    # ===== uWSGI 백엔드 (uwsgi 프로토콜) =====
    location / {
        autoindex off;

        # ----- DDoS 방어: 요청 속도 / 동시 연결 수 제한 (기본 비활성) -----
        # 사용하려면 nginx.conf 의 http 블록에서 limit_req_zone / limit_conn_zone 주석을 해제할 것
        # (한쪽만 켜면 "unknown limit_req zone "general"" 으로 기동 실패. 산정 근거는 nginx.conf 의 해당 주석 참고).
        #limit_req  zone=general burst=20 nodelay;
        #limit_conn addr 10;
        # HTTP 메서드 제한 (기본 비활성) — TRACE/CONNECT 등 비표준 차단
        #limit_except GET POST HEAD OPTIONS PUT DELETE {
        #    deny all;
        #}

        # 백엔드로 요청 메타데이터(QUERY_STRING, REQUEST_METHOD ...) 전달 — uwsgi_pass 에 필수
        include uwsgi_params;

        # 백엔드 — 컨테이너 이름:포트로 직접 전달 (nginx_http_conf.sh 가 appname/serviceport 치환)
        #   예) Docker: uwsgi-app:8000;  Unix 소켓: unix:/run/uwsgi.sock;  로컬: 127.0.0.1:3031;
        uwsgi_pass appname:serviceport;

        # 타임아웃 (백엔드 무한 대기 방지; 앱 처리 시간 + 여유)
        uwsgi_connect_timeout 60s;
        uwsgi_send_timeout    60s;
        uwsgi_read_timeout    60s;

        # 응답 버퍼링 — ⚠ off 로 두면 느린 클라이언트가 백엔드 워커를 점유(slow-read)하므로 on 유지
        uwsgi_buffering          on;
        uwsgi_buffer_size        16k;     # 응답 헤더용
        uwsgi_buffers            16 16k;  # 응답 본문용 (16 × 16KB = 256KB) — 일반 웹/JSON 응답에 충분
        uwsgi_busy_buffers_size  32k;     # = uwsgi_buffer_size × 2
        uwsgi_temp_file_write_size 32k;
        uwsgi_max_temp_file_size 1024m;   # 버퍼 초과분의 디스크 임시 저장 한도 (0 이면 임시파일 미사용)

        # (location 별 오버라이드만 여기에. 예: 장시간 처리 → uwsgi_read_timeout 300s;)
    }

    # Let's Encrypt ACME 챌린지 (HTTPS 전환/갱신용)
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /www/certbot;   # 고정 ACME 챌린지 루트 (letsencrypt.sh -w 와 동일; 앱 루트로 치환되면 안 됨)
        try_files $uri =404;
    }

    # ===== 보안 차단 규칙 =====
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* \.(log|binary|pem|enc|crt|conf|cnf|sql|sh|key|yml|yaml|toml|ini|env|lock|bak|backup|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* (composer\.(json|lock|phar)|package(-lock)?\.json|yarn\.lock|requirements\.txt|Pipfile(\.lock)?|pyproject\.toml|contributing\.md|license\.txt|readme\.(rst|md|txt)|copyright|artisan|gulpfile\.js|phpunit\.xml|access_log|error_log|gruntfile\.js)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; allow all; }
}
