user  www-data;
worker_processes  auto;

# worker_rlimit_nofile: 워커 프로세스 1개가 열 수 있는 파일/소켓(FD)의 최대 개수
# 산정 근거 (쿼드코어 → worker_processes auto = 4, worker_connections 2048 기준):
#   워커당 FD ≈ worker_connections(2048) × 2(리버스 프록시는 연결 1건당 클라이언트+업스트림 소켓 2개)
#             + 상시 FD(에러/액세스 로그, 리스닝 소켓 80/443, epoll, resolver 등) ≈ 50~150
#             ≈ 4150~4250  → 헤드룸 포함 넉넉히 8192
# ⚠ 컨테이너의 hard nofile 한계가 이 값보다 작으면 setrlimit() 실패(경고 로그 후 한계값으로 캡됨).
#    docker-compose 의 webserver 서비스에 ulimits.nofile (hard ≥ 8192, 권장 16384) 를 설정할 것.
worker_rlimit_nofile 8192;
# worker_priority 0;
# worker_cpu_affinity 0001 0010 0100 1000;

error_log  /log/nginx/error.log warn;
pid        /var/run/nginx.pid;


# Load ModSecurity dynamic module
# 참고: 공식 nginx 이미지에는 ModSecurity 모듈이 포함돼 있지 않다.
#       사용하려면 별도 빌드(예: owasp/modsecurity-crs:nginx)나 동적 모듈 컴파일이 필요하다.
# load_module /etc/nginx/modules/ngx_http_modsecurity_module.so;

events {
    use epoll;          # 리눅스에서 권장 (auto 감지되지만 명시)

    # accept_mutex: 새 연결 수락 시 워커들이 mutex로 순번을 정할지 여부
    # off 권장 (nginx 1.11.3+ 기본값) — 커널의 EPOLLEXCLUSIVE 가 thundering herd 를 처리하므로
    #   mutex 는 오히려 신규 연결 수락 지연을 유발한다. 저트래픽 환경에서도 off 가 무난.
    accept_mutex off;

    # multi_accept: 한 번의 이벤트 알림에서 가능한 모든 신규 연결을 한꺼번에 accept 할지 여부
    # off 권장 — 워커 간 연결이 더 고르게 분배되어 한 워커 과부하를 방지하고 응답 시간이 예측 가능해진다.
    #   ~50 req/s 환경에서는 폭주를 한꺼번에 흡수하는 이득이 미미하다.
    multi_accept off;

    # worker_connections: 워커 1개가 동시에 보유할 수 있는 커넥션 수 (클라이언트/업스트림 소켓, 로그 FD 등 모두 포함)
    # 산정 근거 (worker_processes auto = 4, worker_rlimit_nofile 8192 기준):
    #   - 리버스 프록시는 연결 1건당 FD 2개(클라이언트 소켓 + 업스트림 소켓)
    #   - 워커당 상시 FD(로그, 리스닝 소켓 80/443, epoll, resolver 등) ≈ 50~150
    #   - 워커당 안전 상한 ≈ (8192 - 150) / 2 ≈ 4000  →  50% 헤드룸을 두고 2048 로 설정
    #   - 전체 동시 연결 = worker_processes × worker_connections = 4 × 2048 = 8192
    #     (~50 req/s 대비 충분하며 버스트/슬로우 클라이언트 여유 확보)
    # 더 올리려면 worker_rlimit_nofile 와 컨테이너 ulimit(nofile) 도 함께 상향할 것.
    worker_connections 2048;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    # 글로벌(기본) 로그 — server 블록에서 자체 access_log/error_log 를 지정하지 않은 요청
    #   (예: catch-all default_server, 알 수 없는 Host)이 여기 기록된다.
    # 컨테이너 외부 영속 경로(/log/nginx/, docker-compose 로 마운트됨)로 보낸다.
    # buffer/flush 로 디스크 I/O 절감(약 3초분 버퍼링 후 일괄 기록).
    access_log  /log/nginx/main_access.log  main buffer=32k flush=5s;
    error_log   /log/nginx/main_error.log   warn;

    server_tokens off;

    charset utf-8;

    resolver 8.8.8.8 8.8.4.4 valid=300s; # resolver $DNS-IP-1 $DNS-IP-2 valid=300s;
    resolver_timeout 5s;

    # 기본 헤더 버퍼 (대부분의 요청 처리)
    client_header_buffer_size 4k;

    # 큰 헤더 버퍼 (JWT, 큰 쿠키 등)
    large_client_header_buffers 4 16k;

    # POST나 PUT 요청으로 전송하는 본문(body) 데이터를 받을 때, Nginx가 메모리(RAM)에 임시 저장할 버퍼의 크기
    client_body_buffer_size 128k; # 일반적으로 64KB~256KB 권장
    client_body_timeout 15s;  # 클라이언트 본문 수신 타임아웃
    client_header_timeout 15s;  # 클라이언트 헤더 수신 타임아웃

    # 효율적인 파일 전송 설정
    sendfile on;  # 커널 공간에서 직접 파일 전송 (제로카피)
                  # 참고: 호스트가 VM이고 /www 를 공유폴더(vboxsf 등)로 마운트하는 경우에는 stale/truncated 위험 → sendfile off
    tcp_nopush on;  # sendfile 사용 시 패킷 효율 향상
    tcp_nodelay on;  # Keep-alive 연결에서 지연 없이 전송 (실시간 통신에 유리)

    # Keep-alive 연결 설정
    keepalive_timeout 30s;  # 연결 유지 시간
    keepalive_requests 1000;  # 연결당 최대 요청 수
    send_timeout 60s;  # 클라이언트로 응답 전송 타임아웃 (대용량 다운로드/업로드 응답 전송 여유 확보; 두 write 사이 간격 기준)

    # ===== 해시 테이블 =====
    # MIME 타입 해시 테이블 설정
    # mime.types 파일에 정의된 파일 확장자와 MIME 타입 매핑을 저장
    # 예: .html -> text/html, .jpg -> image/jpeg 등의 매핑을 빠르게 찾기 위해 사용됨

    types_hash_max_size 2048;      # 기본 mime.types의 수백 개 타입을 충분히 수용하는 크기
    types_hash_bucket_size 64;     # 각 해시 버킷 크기, CPU 캐시 라인과 정렬하여 성능 최적화

    # 서버 이름 / 변수 해시 테이블 — ngxblocker 의 botblocker-nginx-settings.conf 가 정의한다.
    #   server_names_hash_bucket_size 256; server_names_hash_max_size 4096;
    #   variables_hash_bucket_size 4096;   variables_hash_max_size 4096;
    # ngxblocker 의 globalblacklist.conf 가 수천 개 map 항목을 등록하기 때문에 이 정도 크기가 필요하다.
    # 더 작은 값으로 바꾸려면 ngxblocker include 두 줄 위에서 명시적으로 재정의하지 말고, 차라리
    # ngxblocker include 전에 자체 값을 두지 말 것 (한 곳에서만 정의하면 충돌 없음).

    # ===== 압축 설정 =====
    # 실시간 압축 비활성화 (CPU 부하 감소)
    gzip off;

    # 미리 압축된 .gz 파일 제공 (공식 nginx 이미지에 ngx_http_gzip_static_module 포함됨)
    # 예: style.css 요청 시 → style.css.gz 파일을 찾아서 전송 (없으면 원본으로 폴백)
    gzip_static on;

    # Vary: Accept-Encoding 헤더 추가 (프록시 캐시 호환성)
    gzip_vary on;

    # ===== 요청 속도/연결 수 제한 (Rate Limiting / Connection Limiting) — 기본 비활성, 필요 시 주석 해제 =====
    # limit_req_zone : 클라이언트(IP)별 "평균 요청 속도"를 제어하는 공유 메모리 존을 정의한다.
    #   - 키 $binary_remote_addr : IP를 4바이트(IPv4)로 저장 → $remote_addr(문자열, 최대 ~15B)보다 메모리 절약
    #   - zone=NAME:SIZE         : 존 이름과 공유 메모리 크기. 1MB ≈ 약 16,000개 IP의 상태(64바이트/IP) 저장 가능
    #                              산정: "동시 활성 클라이언트 IP 수 × 64B" 만큼만 있으면 됨.
    #                                    ~50 req/s 규모면 동시 IP가 수천 수준 → 10m(=약 16만 IP)는 넉넉함
    #   - rate=Nr/s              : 허용 평균 속도. nginx가 1/N초 간격으로 토큰을 채워 트래픽을 평활화한다.
    #                              산정: 사이트 총량 ~50 req/s 를 IP들에 공정 분배 → IP당 10r/s 면
    #                                    정상 사용자 1명(페이지+에셋 동시 요청)이 끊김 없이 쓰기 충분하고,
    #                                    1개 IP가 전체 용량을 잠식하지 못한다. (API가 더 작은 페이로드면 상향 가능)
    # limit_conn_zone: 클라이언트(IP)별 "동시 연결 수"를 제어하는 공유 메모리 존을 정의한다.
    #   - 동일하게 $binary_remote_addr 키 사용. 10m 면 약 16만 IP 추적.
    #   - 실제 상한은 server/location 의 `limit_conn NAME N;` 으로 지정한다. N=10 이면 일반 브라우저(병렬 6~8연결)
    #     + 여러 탭에 충분하고, 슬로우로리스류 다중 연결 점유 공격을 완화한다.
    # 사용처: server/location 블록에서 다음과 같이 참조한다.
    #   limit_req  zone=general burst=20 nodelay;   # burst=M : 순간 M건까지 큐 허용(평균 rate 초과분 흡수),
    #                                               #           M+1번째부터 즉시 거부. nodelay : 큐의 요청을
    #                                               #           지연 없이 즉시 처리(큐 슬롯만 소비) → 체감 지연 최소화
    #   limit_conn addr 10;
    # 거부 응답 코드는 기본 503 이며 limit_req_status / limit_conn_status 로 바꿀 수 있다(429 권장).
    # ⚠ 아래를 주석 해제하면, 이 zone을 참조하는 server/location(예: sample_nginx_http.conf 의 limit_req / limit_conn /
    #    limit_except)도 함께 주석 해제해야 한다. 한쪽만 켜면 "unknown limit_req zone "general"" 으로 기동 실패한다.
    #limit_req_zone   $binary_remote_addr  zone=general:10m  rate=10r/s;
    #limit_conn_zone  $binary_remote_addr  zone=addr:10m;
    #limit_req_status  429;
    #limit_conn_status 429;

    # 악성 봇/스캐너/리퍼러 차단 — nginx-ultimate-bad-bot-blocker (mitchellkrogza)
    #   - http context maps 는 /etc/nginx/ngxblocker.d/ 에 둔다 (기본 /etc/nginx/conf.d/ 가 아님):
    #     compose 가 호스트의 conf.d/ 를 통째로 마운트 → 이미지의 conf.d/*.conf 가 가려지기 때문.
    #     (Dockerfile 의 install-ngxblocker -x -c /etc/nginx/ngxblocker.d 결과물).
    #   - 도메인 server 블록은 /etc/nginx/bots.d/blockbots.conf + /etc/nginx/bots.d/ddos.conf 를
    #     include 하여 실제 차단을 수행 (sample_nginx*.conf 참조).
    #   - 갱신: 컨테이너 cron 이 6시간마다 update-ngxblocker -c /etc/nginx/ngxblocker.d 실행.
    include /etc/nginx/botblocker-nginx-settings.conf;
    include /etc/nginx/globalblacklist.conf;

    # 도메인별 server 블록(nginx_http_conf.sh / nginx_https_conf.sh 로 생성) + default.conf(catch-all) 로드.
    include /etc/nginx/conf.d/*.conf;
}
