# =============================================================================
# Domain Sample (HTTP only) — gunicorn 백엔드
# 서버 사양: 8 vCPU / 8 GB RAM
# 백엔드  : Gunicorn (Django/FastAPI 등)
# 사용법  : nginx_http_conf.sh 가 본 파일의 토큰을 sed 치환하여
#           conf.d/{filename}_gunicorn_ng_http.conf 로 출력한다.
#           (HTTPS 버전은 sample_nginx_https.conf + nginx_https_conf.sh)
# 토큰    : portnumber, domain, webroot, appname, serviceport, filename
# =============================================================================

server {
    listen          portnumber;
    server_name     domain www.domain;

    # ---- 도메인 단위 업로드 제한 (공통값을 override 하려면 여기서) ------------
    # client_max_body_size 100M;

    # ---- 악성 봇 / DDoS 차단 (nginx-ultimate-bad-bot-blocker) ---------------
    # server 컨텍스트에 들어가는 ngxblocker 파일은 다음 2개뿐이다:
    #   · blockbots.conf : server-level `if ($bad_bot)` 검사 + 444 return
    #   · ddos.conf      : server-level limit_conn / limit_req directive (봇만 적용)
    # 나머지 bots.d/{whitelist,blacklist,bad-referrer,custom-bad-referrers}*.conf 는
    # globalblacklist.conf 가 http 컨텍스트 안의 map/geo 블록에서 자동으로 include
    # 한다. server 블록에 직접 include 하면 운영자가 항목을 추가하는 순간
    # `nginx -t` 가 실패하므로 절대 두지 말 것.
    # 자동 갱신: 컨테이너 안 cron 이 6시간마다 update-ngxblocker 실행
    include /etc/nginx/bots.d/blockbots.conf;
    include /etc/nginx/bots.d/ddos.conf;

    # ---- 보안 헤더 (HTTP 환경) ----------------------------------------------
    # 주의: HSTS 는 HTTPS 전용이므로 HTTP-only 에는 두지 않는다.
    add_header Content-Security-Policy "frame-ancestors 'self';" always;
    add_header X-Content-Type-Options  "nosniff" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ---- 로그 ----------------------------------------------------------------
    access_log /log/nginx/filename.gunicorn_http_access.log main buffer=32k flush=5s;
    error_log  /log/nginx/filename.gunicorn_http_error.log  warn;

    # ---- 정적 자원 (Django/FastAPI media) ------------------------------------
    location /media/ {
        alias       /www/webroot/media/;
        autoindex   off;
        access_log  off;
        expires     30d;
        add_header  Cache-Control "public, max-age=2592000";

        location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
            expires     max;
            add_header  Cache-Control "public, max-age=31536000, immutable";
            access_log  off;
        }
    }

    # ---- 정적 자원 (Django/FastAPI static) -----------------------------------
    location /static/ {
        alias       /www/webroot/static/;
        autoindex   off;
        access_log  off;
        expires     max;
        add_header  Cache-Control "public, max-age=31536000, immutable";

        location ~* \.(woff|woff2|ttf|eot)$ {
            add_header  Access-Control-Allow-Origin "*";
            add_header  Cache-Control "public, max-age=31536000, immutable";
            expires     max;
            access_log  off;
        }
    }

    # ---- ACME 챌린지 (letsencrypt.sh 가 /www/certbot 사용) -------------------
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root         /www/certbot;
        try_files    $uri =404;
    }

    # ---- 메인 애플리케이션 (Gunicorn) ----------------------------------------
    location / {
        autoindex off;

        # 프로젝트 정책: 글로벌 rate-limit 비활성 (ngxblocker 가 봇 전용 쓰로틀링 담당).
        # 도메인 단위 throttle 이 필요하면 해당 도메인 conf.d 파일 안에 고유 이름의
        # limit_conn_zone / limit_req_zone 을 정의한 뒤 location 에서만 호출하라.

        # 표준 HTTP 메서드만 허용
        limit_except GET POST HEAD OPTIONS PUT DELETE PATCH {
            deny all;
        }

        # 공통 프록시 헤더/타임아웃/버퍼 (proxy_params)
        include /etc/nginx/proxy_params;

        proxy_pass http://appname:serviceport;

        # ----- WebSocket 사용 시 아래 두 줄 활성화 -----------------------------
        # proxy_set_header Upgrade    $http_upgrade;
        # proxy_set_header Connection $connection_upgrade;
    }

    # ---- 보안 차단 ----------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(log|binary|pem|enc|crt|conf|cnf|sql|sh|key|yml|yaml|toml|ini|env|lock|bak|backup|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* (composer\.(json|lock|phar)|package(-lock)?\.json|yarn\.lock|requirements\.txt|Pipfile(\.lock)?|pyproject\.toml|poetry\.lock|gulpfile\.js|gruntfile\.js|phpunit\.xml|artisan)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log    off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log    off;
        allow all;
    }
}
