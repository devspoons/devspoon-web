# ===============================================
# Production Level Nginx Configuration (HTTP-Only Template)
# 서버 사양: 쿼드코어 CPU, 4GB RAM, ~50 req/s
# 백엔드: FastAPI/Uvicorn REST API Server
# ===============================================
#
# 이 파일은 nginx_http_conf.sh 가 placeholder(webroot / portnumber / domain / appname / serviceport / filename)를
# 치환하여 conf.d/<filename>_uvicorn_ng_http.conf 로 생성한다. (HTTPS 버전은 sample_nginx_https.conf / nginx_https_conf.sh)

# HTTP 서버 블록 - 메인 애플리케이션
# 역할: HTTP 트래픽 처리, FastAPI/Uvicorn 백엔드 프록시 및 정적 파일 서빙
# 주의: SSL/TLS 암호화 없음, 민감한 데이터 전송 시 보안 취약 (프로덕션은 sample_nginx_https.conf 권장)
server {
    listen       portnumber;
    server_name  domain www.domain;

    # 악성 봇/스캐너 차단 — nginx-ultimate-bad-bot-blocker (mitchellkrogza) 사용.
    #   blockbots.conf : User-Agent / Referrer / Bad-IP 매칭 시 444 종료 (~수천 패턴, 커뮤니티 관리)
    #   ddos.conf      : 비정상 다량 요청 차단
    # 차단 리스트는 nginx 이미지 빌드 시 /etc/nginx/bots.d/ 로 설치되고
    # cron(/usr/local/sbin/update-ngxblocker) 으로 6시간마다 자동 갱신된다.
    include /etc/nginx/bots.d/blockbots.conf;
    include /etc/nginx/bots.d/ddos.conf;
    # ===== 보안 헤더 (HTTP 환경에서 유효한 것만; HSTS 는 HTTPS 전용이라 제외) =====
    # CSP — frame-ancestors 는 iframe 임베딩 허용 출처. 'self' = 동일 출처만 허용 (Clickjacking 방어).
    # 외부 도메인 임베딩이 필요하면 'self' 뒤에 https://embedder.example.com 형식으로 추가, 아예 차단하려면 'none'.
    add_header Content-Security-Policy "frame-ancestors 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;                       # MIME 스니핑 방지
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;       # 리퍼러 유출 최소화

    # ===== 성능 최적화 =====
    # 요청 본문 최대 크기 — 초과 시 413. php.ini 등 백엔드 업로드 한도와 일치시킬 것. 대용량 업로드 DoS 완화.
    client_max_body_size 50M;

    # 열린 파일 핸들 캐싱으로 정적 파일 서빙 시 디스크 I/O 감소
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ===== 로깅 (영속 경로 /log/nginx/, docker-compose 로 마운트됨; 'main' 포맷은 nginx.conf 정의) =====
    access_log /log/nginx/filename.com.uvicorn_access_http.log main buffer=32k flush=5s;
    error_log  /log/nginx/filename.com.uvicorn_error_http.log warn;

    # ===== 정적 파일 처리 =====
    # FastAPI/Django 미디어 파일(사용자 업로드). FastAPI 라면 app.mount("/media", StaticFiles(directory=...)) 등.
    location /media {
        autoindex off;
        alias /www/webroot/media;
        gzip_static on;                                                       # 사전 압축된 .gz 우선 (nginx.conf 의 gzip_static on)
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";        # 버전화된 파일 가정; 변경되는 파일은 캐싱 주기 축소 권장

        location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }
        access_log off;
    }

    # FastAPI/Django 정적 파일 (CSS/JS/폰트 등)
    location /static {
        autoindex off;
        alias /www/webroot/static;
        gzip_static on;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";

        location ~* \.(css|js)$ {
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }
        location ~* \.(woff|woff2|ttf|eot)$ {                                 # 웹폰트: 장기 캐싱 + CORS 허용
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
            access_log off;
        }
        access_log off;
    }

    # ===== FastAPI/Uvicorn 백엔드 프록시 =====
    location / {
        autoindex off;

        # ----- DDoS 방어: 요청 속도 / 동시 연결 수 제한 (기본 비활성) -----
        # 아래를 사용하려면 먼저 nginx.conf 의 http 블록에서 limit_req_zone / limit_conn_zone 주석을 해제할 것.
        # (한쪽만 켜면 "unknown limit_req zone "general"" 으로 기동 실패. 산정 근거는 nginx.conf 의 해당 주석 참고)
        #   - limit_req  : burst=M 만큼 순간 큐 허용(평균 rate 초과분 흡수), 초과 시 거부.
        #                  nodelay 는 큐 요청을 지연 없이 즉시 처리(큐 슬롯만 소비) → 사용자 체감 지연 최소화.
        #   - limit_conn : IP당 동시 연결 상한 → 슬로우로리스류 다중 연결 점유 완화.
        #limit_req  zone=general burst=20 nodelay;
        #limit_conn addr 10;

        # HTTP 메서드 제한 (기본 비활성) — RESTful 표준 메서드만 허용, TRACE/CONNECT 등 비표준 차단.
        # GET 조회 / POST 생성 / PUT 수정 / DELETE 삭제 / HEAD 메타데이터 / OPTIONS CORS 프리플라이트.
        #limit_except GET POST HEAD OPTIONS PUT DELETE {
        #    deny all;
        #}

        # 백엔드 프록시 — 컨테이너 이름:포트로 직접 전달 (nginx_http_conf.sh 가 appname/serviceport 치환).
        #   - Docker:    proxy_pass http://appname:serviceport;   (예: http://uvicorn-app:8000;)
        #   - 로컬:      proxy_pass http://127.0.0.1:8000;
        #   - Unix 소켓: proxy_pass http://unix:/run/uvicorn.sock;
        proxy_pass http://appname:serviceport;

        # 프록시 공통 파라미터(클라이언트 정보 헤더, HTTP/1.1, 타임아웃 60s,
        # 버퍼링 on(백엔드 노출 방지) 등) — /etc/nginx/proxy_params 파일에서 일괄 관리.
        include /etc/nginx/proxy_params;

        # (location 별로 달리 줘야 하는 값만 여기서 덮어쓴다)
        # 예) 장시간 처리 API:  proxy_read_timeout 300s;  proxy_send_timeout 300s;
        # 예) 백엔드에 gzip 응답 강제 요청(FastAPI GZipMiddleware 등):  proxy_set_header Accept-Encoding gzip;
        # 참고) WebSocket 은 현재 미사용. 쓰려면 nginx.conf 에 map $http_upgrade $connection_upgrade 정의 후
        #       해당 location 에서만 proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade; 로 덮어쓸 것.
    }

    # Let's Encrypt ACME 챌린지 (HTTPS 전환/갱신용) — try_files 로 파일 존재 확인만 (디렉토리 트래버설 차단)
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /www/certbot;   # 고정 ACME 챌린지 루트 (letsencrypt.sh -w 와 동일; 앱 루트로 치환되면 안 됨)
        try_files $uri =404;
    }

    # ===== 보안 차단 규칙 =====
    # 숨김 파일(.git/.env/.htaccess 등) 차단
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    # 민감한 확장자(설정/인증서/스크립트/로그/백업 등) 차단
    location ~* \.(log|binary|pem|enc|crt|conf|cnf|sql|sh|key|yml|yaml|toml|ini|env|lock|bak|backup|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    # 프로젝트 메타데이터(의존성/빌드 설정 파일) 차단
    location ~* (composer\.(json|lock|phar)|package(-lock)?\.json|yarn\.lock|requirements\.txt|Pipfile(\.lock)?|pyproject\.toml|contributing\.md|license\.txt|readme\.(rst|md|txt)|copyright|artisan|gulpfile\.js|phpunit\.xml|access_log|error_log|gruntfile\.js)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; allow all; }
}
