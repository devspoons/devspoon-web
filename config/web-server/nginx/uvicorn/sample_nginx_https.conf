# ===============================================
# Production Level Nginx Configuration (HTTPS Template)
# 서버 사양: 쿼드코어 CPU, 4GB RAM, ~50 req/s
# 백엔드: FastAPI/Uvicorn REST API Server
# ===============================================
#
# nginx_https_conf.sh 가 placeholder(webroot / portnumber / domain / appname / serviceport / filename)를
# 치환하여 conf.d/<filename>_uvicorn_ng_https.conf 로 생성한다.
# SSL 준비물:
#   - 인증서:   certbot certonly --webroot -w /www/certbot -d domain -d www.domain
#   - DH 파라미터: /etc/nginx/dhparam.pem — 이미지에 빌드 시 1회 생성되어 구워짐 (수동 생성 불필요)
#   - privkey.pem 권한 600 (chmod 600)

# ----- HTTP(80) → HTTPS(443) 리다이렉트 + ACME 챌린지 -----
server {
    listen       portnumber;
    server_name  domain www.domain;
    # Let's Encrypt ACME 챌린지 (인증서 발급/갱신용)
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /www/certbot;
        try_files $uri =404;
    }

    # 그 외 모든 요청은 HTTPS 로 301 (원본 호스트 유지를 위해 $host 사용)
    location / {
        return 301 https://$host$request_uri;
    }
}

# ----- HTTPS(443) 메인 애플리케이션 -----
server {
    listen      443 ssl;
    http2       on;                          # nginx 1.25.1+ 권장 문법 (listen 의 http2 파라미터는 deprecated)
    server_name domain www.domain;

    # 악성 봇/스캐너 차단 — nginx-ultimate-bad-bot-blocker (mitchellkrogza) 사용.
    #   blockbots.conf : User-Agent / Referrer / Bad-IP 매칭 시 444 종료
    #   ddos.conf      : 비정상 다량 요청 차단
    # 차단 리스트는 cron(/usr/local/sbin/update-ngxblocker) 으로 6시간마다 갱신된다.
    include /etc/nginx/bots.d/blockbots.conf;
    include /etc/nginx/bots.d/ddos.conf;

    # ===== SSL/TLS =====
    ssl_certificate     /etc/letsencrypt/live/domain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domain/privkey.pem;
    ssl_dhparam         /etc/nginx/dhparam.pem;            # 이미지에 빌드 시 1회 생성되어 구워짐 (./ssl/dhparam 호스트 볼륨으로 백업/복원)

    ssl_session_cache   shared:SSL:10m;                              # 약 40,000 세션 (세션당 ~256B); 세션 재사용 시 핸드셰이크 CPU ↓
    ssl_session_timeout 10m;
    ssl_session_tickets off;                                        # 티켓 키 유출 시 과거 트래픽 복호화 방지 (PFS)

    ssl_protocols             TLSv1.2 TLSv1.3;                       # TLS 1.0/1.1 제외 (POODLE/BEAST)
    ssl_prefer_server_ciphers off;                                  # TLS 1.3 권장값
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
    ssl_ecdh_curve            secp384r1;

    # OCSP 스테이플링 — 인증서 취소 상태를 미리 첨부하여 핸드셰이크 RTT 1회 절감
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/domain/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;                            # OCSP 서버 도메인 해석용 (외부 DNS)
    resolver_timeout 5s;

    # ===== 보안 헤더 =====
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;   # HTTPS 강제, MITM/SSLStrip 방어
    add_header Content-Security-Policy "frame-ancestors 'self';" always;  # 동일 출처만 iframe 임베딩 허용 (Clickjacking 방어).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # ===== 성능 최적화 =====
    client_max_body_size 50M;                                       # 백엔드 업로드 한도와 일치시킬 것
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ===== 로깅 (영속 경로 /log/nginx/) =====
    access_log /log/nginx/filename.com.uvicorn_access_https.log main buffer=32k flush=5s;
    error_log  /log/nginx/filename.com.uvicorn_error_https.log warn;

    # ===== 정적 파일 처리 =====
    location /media {
        autoindex off;
        alias /www/webroot/media;
        gzip_static on;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }
        access_log off;
    }
    location /static {
        autoindex off;
        alias /www/webroot/static;
        gzip_static on;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        location ~* \.(css|js)$ {
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }
        location ~* \.(woff|woff2|ttf|eot)$ {
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
            access_log off;
        }
        access_log off;
    }

    # ===== FastAPI/Uvicorn 백엔드 프록시 =====
    location / {
        autoindex off;

        # ----- DDoS 방어: 요청 속도 / 동시 연결 수 제한 (기본 비활성; nginx.conf 의 limit_req_zone/limit_conn_zone 주석 해제 후 사용) -----
        #limit_req  zone=general burst=20 nodelay;
        #limit_conn addr 10;
        # HTTP 메서드 제한 (기본 비활성)
        #limit_except GET POST HEAD OPTIONS PUT DELETE {
        #    deny all;
        #}

        # 백엔드 프록시 — 컨테이너 이름:포트로 직접 전달 (nginx_https_conf.sh 가 appname/serviceport 치환).
        #   예) Docker: http://uvicorn-app:8000;  로컬: http://127.0.0.1:8000;  Unix 소켓: http://unix:/run/uvicorn.sock;
        proxy_pass http://appname:serviceport;

        # 프록시 공통 파라미터 (헤더 전달, HTTP/1.1, 타임아웃 60s, 버퍼링 on 등)
        include /etc/nginx/proxy_params;

        # X-Forwarded-Proto 는 proxy_params 에서 $scheme 로 전달됨 → 백엔드는 이를 보고 https 여부/secure 쿠키 판단.
        # (location 별 오버라이드가 필요하면 여기에. 예: proxy_read_timeout 300s;)
    }

    # Let's Encrypt ACME 챌린지 (HTTPS 포트에서도 처리)
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /www/certbot;
        try_files $uri =404;
    }

    # ===== 보안 차단 규칙 =====
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* \.(log|binary|pem|enc|crt|conf|cnf|sql|sh|key|yml|yaml|toml|ini|env|lock|bak|backup|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* (composer\.(json|lock|phar)|package(-lock)?\.json|yarn\.lock|requirements\.txt|Pipfile(\.lock)?|pyproject\.toml)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; allow all; }
}
