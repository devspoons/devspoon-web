# =====================================================================
# Catch-all (default_server) — server_name 매칭이 안 되는(알 수 없는 Host/SNI) 요청을 처리.
# 도메인별 server 블록(conf.d/*.conf, nginx_http_conf.sh 로 생성)들은 모두 명시적 server_name 을 가지므로
# 정상 요청에는 영향이 없다.
# ⚠ 포트 80/443 각각에 default_server 는 정확히 1개만 있어야 한다.
#    → 도메인 샘플(django_sample_*_http_ng.conf / sample_php_ng_http.conf)에는 default_server 를 두지 않는다.
# =====================================================================

# HTTP catch-all : 알 수 없는 Host 로 들어온 평문 요청은 헤더 없이 연결 종료
server {
    listen 80 default_server;
    server_name _;
    return 444;          # NGINX 전용 코드 — 응답 없이 연결을 끊는다
}

# HTTPS catch-all : 알 수 없는 SNI 로 들어온 TLS 핸드셰이크를 인증서 없이 거부 (nginx 1.19.4+ 의 ssl_reject_handshake)
# 이게 없으면 알 수 없는 SNI 요청이 알파벳상 첫 번째 HTTPS 도메인 server 블록으로 가서 그 도메인의 인증서가 노출된다.
server {
    listen 443 ssl default_server;
    ssl_reject_handshake on;
}
