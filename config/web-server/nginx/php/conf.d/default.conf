# =============================================================================
# Default catch-all (어떤 도메인에도 매칭되지 않는 트래픽 처리)
# 역할: 알려지지 않은 Host 헤더 / IP 직접 접근 차단 + 로그 격리
# 동작: 444 (헤더 없이 즉시 연결 종료) — 봇 / 스캐너 / 도메인 스푸핑에 가장 가벼움
# =============================================================================

# IPv4 + IPv6 모두 default_server 로 명시
server {
    listen      80      default_server;
    listen      [::]:80 default_server;
    server_name _;

    # 별도 로그로 격리 — 메인 액세스 로그 노이즈 감소 + 공격 패턴 분석 용이
    access_log  /log/nginx/default_drop_access.log main buffer=32k flush=10s;
    error_log   /log/nginx/default_drop_error.log  warn;

    return 444;
}

# =============================================================================
# HTTPS 측 default_server (SNI 미일치 / IP 직접 HTTPS 접근 차단)
# =============================================================================
#
# ▣ 왜 필요한가 — 도메인 인증서가 있어도 default 가 꼭 따로 있어야 하는 이유
#
#   default_server 가 없으면 nginx 는 SNI 가 어떤 server_name 에도 매칭되지 않을 때
#   listen 443 블록 중 "설정 파일에서 첫 번째로 나오는 server" 를 자동으로
#   default 로 사용한다. 즉 도메인용 server 블록 하나(예: example.com)가 의도와
#   무관하게 catch-all 역할까지 떠맡게 된다. 결과:
#
#   [a] 정보 누출
#       IP 로 직접 접근하거나 스캐너가 SNI 없이 HTTPS handshake 를 시도하면
#       nginx 가 example.com 의 fullchain.pem 을 그대로 응답에 실어준다.
#       공격자가 IP 만 알고 있던 단계에서 "이 IP 에는 example.com 이 호스팅되어
#       있다" 를 인증서 CN/SAN 으로 즉시 확인 가능 — 정찰 범위 축소.
#
#   [b] 봇 / 스캐너가 모든 도메인 서버 블록으로 흘러들어옴
#       blockbots.conf / ddos.conf 의 차단은 server 블록 단위로 동작하므로
#       SNI 스푸핑 트래픽이 잘못된 server 블록의 로그/차단 카운터를 오염시킨다.
#
#   [c] 444 격리 로그가 안 남음
#       80 측 default_server 는 444 로 즉시 끊고 default_drop_*.log 에 격리
#       기록하는데, 443 측에 default 가 없으면 그 정찰 패턴이 도메인 access_log
#       속에 섞여 사후 분석이 어려워진다.
#
#   따라서 도메인 인증서가 정상 발급되어 있어도 "443 측 default_server 는 별도로
#   존재해야" 한다. 단순히 도메인 인증서를 재활용해도 [a] 의 정보 누출이 남으므로
#   해결책은 두 가지 중 하나다 — 아래 ▣ 활성화 절차 참고.
#
# ▣ 적용 방식 (현재 활성화 상태 — 방법 1 권장 구현)
#
#   docker/nginx/Dockerfile 의 RUN 단계가 이미지 빌드 시점에 self-signed dummy
#   인증서 한 쌍을 /etc/nginx/ssl/default/ 에 자동 생성한다 (CN=default-reject,
#   10년 유효). 이 인증서는 응답에 노출되지 않고, 아래 server 블록의
#   ssl_reject_handshake on; 이 SNI 미매칭 트래픽에 대해 TLS handshake 자체를
#   거부하여 [a] 정보 누출을 차단한다 (nginx 1.19.4+ 기능; 본 컨테이너는 1.27).
#
#   dummy 인증서 자동 갱신은 불필요 (응답에 안 나가므로 만료/체인 검증 무관).
#   재생성하려면: docker exec <container> bash -c '
#     openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
#       -subj "/CN=default-reject" \
#       -keyout /etc/nginx/ssl/default/privkey.pem \
#       -out   /etc/nginx/ssl/default/fullchain.pem && nginx -s reload'
#
#   비활성화하려면 본 server 블록 전체를 주석으로 감싸면 됨. 단 그 경우 [a]~[c]
#   위험이 다시 노출되므로 운영 진입 후 비활성화는 권장하지 않음.
#
# ▣ (참고) 비권장 대안 — 도메인 인증서 재활용
#   dummy 대신 운영중인 도메인 인증서를 default 에 그대로 쓰는 방법. [a] 정보
#   누출이 여전하고 letsencrypt 갱신 cron 의 깨짐 영향까지 받으므로 권장하지 않음.
#
server {
    listen      443 ssl default_server;
    listen      [::]:443 ssl default_server;
    http2       on;
    server_name _;

    # 방법 1 의 dummy 인증서 (응답에 노출 안 됨; ssl_reject_handshake 가 가로챔)
    # Dockerfile 의 RUN 단계가 빌드 시점에 /etc/nginx/ssl/default/ 에 자동 생성.
    # /etc/nginx/ 는 compose mount 대상이 아니므로 호스트 ssl/certs 마운트에 가려지지 않음.
    ssl_certificate     /etc/nginx/ssl/default/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/default/privkey.pem;

    # nginx 1.19.4+ — SNI 매칭 실패 시 ServerHello 직전에 unrecognized_name alert
    #                  로 즉시 끊는다. 인증서 정보 노출 0.
    ssl_reject_handshake on;

    access_log /log/nginx/default_drop_https_access.log main buffer=32k flush=10s;
    error_log  /log/nginx/default_drop_https_error.log  warn;

    # ssl_reject_handshake 가 우선 동작하지만, 혹시 우회될 때 안전 장치로 444.
    return 444;
}
