# =============================================================================
# Nginx Main Configuration (php-fpm 스택)
# 서버 사양: 8 vCPU / 8 GB RAM
# 역할: 모든 도메인이 공유하는 공통 설정만 포함. 도메인 특화 항목 금지.
#       도메인별 server 블록은 conf.d/ 에서 정의된다.
# =============================================================================

user                www-data;

# CPU 코어 수만큼 워커 자동 생성 (8 vCPU → 8 워커)
worker_processes    auto;

# 워커당 파일 디스크립터 상한
# 계산: worker_connections(4096) × 2(클라이언트+업스트림) + 로그/소켓 오버헤드
#       8 × 4096 × 2 = 65536 → 여유 두고 65535
worker_rlimit_nofile 65535;

error_log           /log/nginx/error.log warn;
pid                 /var/run/nginx.pid;


events {
    use                 epoll;          # Linux 권장
    multi_accept        on;             # 8 코어에서 accept 버스트 흡수
    accept_mutex        off;            # epoll + reuseport 환경에서 off가 균등 분배에 유리
    worker_connections  4096;           # 워커당 동시 연결 (8 × 4096 = 32768 동시 연결)
}


http {
    # -------------------------------------------------------------------------
    # 기본 MIME / 로그
    # -------------------------------------------------------------------------
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;
    charset             utf-8;
    server_tokens       off;

    log_format  main    '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'urt="$upstream_response_time"';

    access_log          /log/nginx/main_access.log main buffer=64k flush=5s;
    error_log           /log/nginx/main_error.log warn;

    # -------------------------------------------------------------------------
    # DNS 리졸버 (resolver) — OCSP/upstream 도메인 해석용
    # -------------------------------------------------------------------------
    resolver            1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout    5s;

    # -------------------------------------------------------------------------
    # 클라이언트 요청 버퍼 / 타임아웃
    # -------------------------------------------------------------------------
    client_header_buffer_size       4k;
    large_client_header_buffers     4 16k;       # JWT/쿠키 큰 헤더 대응
    client_body_buffer_size         16k;         # 일반 폼 본문은 메모리, 큰 업로드는 디스크 임시
    client_max_body_size            50M;         # php.ini 의 post_max_size 와 정합 유지
    client_header_timeout           15s;
    client_body_timeout             15s;
    send_timeout                    15s;

    # -------------------------------------------------------------------------
    # TCP / sendfile 최적화
    # -------------------------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    reset_timedout_connection on;

    # -------------------------------------------------------------------------
    # Keep-alive (클라이언트)
    # -------------------------------------------------------------------------
    keepalive_timeout   65s;
    keepalive_requests  1000;

    # -------------------------------------------------------------------------
    # 해시 테이블 (도메인/MIME/변수/map)
    # - map_hash_*: ngxblocker globalblacklist.conf 가 1000+ regex map 을 정의하므로
    #   기본값(2048/32-64) 으로는 "could not build map_hash" 경고가 startup 로그에
    #   발생할 수 있다. 업스트림 권장에 따라 4096 / 256 으로 상향.
    # -------------------------------------------------------------------------
    types_hash_max_size             4096;
    types_hash_bucket_size          64;
    server_names_hash_max_size      2048;
    server_names_hash_bucket_size   64;
    variables_hash_max_size         2048;
    variables_hash_bucket_size      64;
    map_hash_max_size               4096;
    map_hash_bucket_size            256;

    # -------------------------------------------------------------------------
    # 파일 핸들 캐시 — 정적 자산 처리 가속
    # -------------------------------------------------------------------------
    open_file_cache             max=10000 inactive=60s;
    open_file_cache_valid       60s;
    open_file_cache_min_uses    2;
    open_file_cache_errors      on;

    # -------------------------------------------------------------------------
    # 압축 — 8 코어 환경에서 실시간 gzip 허용
    # -------------------------------------------------------------------------
    gzip                on;
    gzip_static         on;
    gzip_vary           on;
    gzip_min_length     1024;
    gzip_proxied        any;
    gzip_comp_level     5;
    gzip_types          text/plain text/css text/xml text/javascript
                        application/javascript application/json
                        application/xml application/xml+rss
                        application/wasm font/ttf font/otf
                        image/svg+xml image/x-icon;

    # -------------------------------------------------------------------------
    # 프로젝트 측 글로벌 rate-limit 정책 (정상 사용자 무영향 — ddos.conf 호환)
    # - bots.d/ddos.conf 는 server 블록에서 다음 두 directive 를 호출한다:
    #       limit_conn addr 200;
    #       limit_req  zone=flood burst=200 nodelay;
    # - 두 zone (addr, flood) 은 ngxblocker globalblacklist.conf 가 자체 정의하지
    #   않으므로 (그쪽은 bot2_*/bot4_* zone 만 정의), ddos.conf 를 include 한
    #   server 블록이 nginx -t 를 통과하려면 본 파일에서 storage 를 정의해야 한다
    #   (그렇지 않으면 `zero-size shared memory zone "addr"` emerg → nginx 기동 실패).
    # - 단, key 변수를 $bot_iplimit 로 한정한다:
    #     · 이 변수는 globalblacklist.conf 의 `map $bad_bot $bot_iplimit { ... }`
    #       이 정의 — 봇 매칭 시에만 IP 로 채워지고 정상 트래픽엔 빈 문자열이 되어
    #       nginx 가 limit_* directive 적용 대상에서 자동 제외.
    #     · 결과적으로 ddos.conf 의 limit_conn / limit_req 는 봇 흐름에만 발현되고,
    #       정상 사용자에게는 어떠한 throttling 도 적용되지 않는다.
    # - 도메인 단위로 일반 사용자 throttle 이 필요한 경우엔 해당 도메인의 conf.d
    #   파일 안에 고유 이름의 zone 을 별도 정의하고 거기서만 limit_* 를 호출한다.
    # -------------------------------------------------------------------------
    limit_conn_zone $bot_iplimit zone=addr:50m;
    limit_req_zone  $bot_iplimit zone=flood:50m rate=90r/s;

    # -------------------------------------------------------------------------
    # real_ip 모듈 (LB / CDN / 외부 reverse-proxy 뒤에서 운영할 때 필수)
    #
    # ▣ 기본 상태: 비활성 (본 컨테이너가 인터넷에 직접 노출되는 단일-노드 운영 가정)
    #
    # ▣ 활성화가 필요한 환경 (다음 중 하나라도 해당하면 반드시 켜야 함):
    #   · CloudFlare / AWS CloudFront / Akamai 등 CDN 뒤에서 운영
    #   · AWS ALB / NLB, GCP HTTPS LB, Azure App Gateway 등 클라우드 L7 LB 뒤
    #   · 외부 nginx / HAProxy / Traefik 등 reverse-proxy 가 본 컨테이너 앞에 있음
    #   · k8s ingress-nginx / istio gateway / linkerd 등 service mesh 뒤
    #
    # ▣ 비활성 상태에서 LB 뒤로 들어가면 발생하는 문제:
    #   · nginx 가 보는 $remote_addr 가 LB / CDN 의 IP 한 개로 고정됨
    #   · ddos.conf 의 limit_conn / limit_req 가 사용하는 $bot_iplimit key 는
    #     globalblacklist.conf 의 map 이 $remote_addr 를 참조해 결정 — 결국
    #     모든 클라이언트가 같은 LB IP 한 개로 묶여 봇 분리가 무의미해짐
    #   · 단일 LB IP 가 봇 패턴 매칭에 한 번 걸리면 그 LB 를 통과하는 정상 사용자
    #     전체가 함께 차단되는 대형 사고 가능
    #   · globalblacklist.conf 의 geo 기반 IP 차단도 LB IP 만 봄 → 실제 공격자 IP
    #     차단 불가
    #   · 액세스 로그의 $remote_addr 컬럼이 LB IP 만 기록 → 사후 분석 불가
    #     (proxy_params 가 백엔드 앱에는 X-Forwarded-For 를 넘기지만, nginx 자신의
    #      봇 차단 / 로깅 / throttling 로직은 여전히 $remote_addr 만 본다)
    #
    # ▣ 활성화 방법: 본인의 신뢰 가능한 프록시 IP 대역을 set_real_ip_from 에 명시.
    #   신뢰하지 않는 출처에서 X-Forwarded-For 를 받으면 클라이언트가 임의의 IP 로
    #   자신을 위장(스푸핑) 할 수 있으므로 set_real_ip_from 의 대역을 최소화하라.
    #
    #   real_ip_recursive on  → 신뢰 대역 안의 IP 들을 X-Forwarded-For 끝에서부터
    #                            차례로 벗겨내며, 신뢰 대역 밖의 첫 IP 를 클라이언트로 채택.
    #                            (LB 가 여러 단 쌓여있는 환경 대응)
    #
    # ━━━ 환경별 활성화 예시 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    #
    # [예시 A] CloudFlare CDN 뒤에서 운영
    #   - 신뢰 대역은 CloudFlare 공식 IP 목록만 (https://www.cloudflare.com/ips/).
    #     이 목록은 분기 단위로 변경되므로 cron 으로 자동 갱신하거나, 변경 시점에
    #     수동으로 set_real_ip_from 행을 갱신해야 한다.
    #   - 헤더는 CF-Connecting-IP 사용 (CloudFlare 가 항상 정확한 1개의 IP 만 채움 →
    #     X-Forwarded-For 의 멀티-홉 문제 회피)
    #
    #   # set_real_ip_from 173.245.48.0/20;
    #   # set_real_ip_from 103.21.244.0/22;
    #   # set_real_ip_from 103.22.200.0/22;
    #   # set_real_ip_from 103.31.4.0/22;
    #   # set_real_ip_from 141.101.64.0/18;
    #   # set_real_ip_from 108.162.192.0/18;
    #   # set_real_ip_from 190.93.240.0/20;
    #   # set_real_ip_from 188.114.96.0/20;
    #   # set_real_ip_from 197.234.240.0/22;
    #   # set_real_ip_from 198.41.128.0/17;
    #   # set_real_ip_from 162.158.0.0/15;
    #   # set_real_ip_from 104.16.0.0/13;
    #   # set_real_ip_from 104.24.0.0/14;
    #   # set_real_ip_from 172.64.0.0/13;
    #   # set_real_ip_from 131.0.72.0/22;
    #   # set_real_ip_from 2400:cb00::/32;        # IPv6 (자체 nginx 가 ipv6 활성 시)
    #   # set_real_ip_from 2606:4700::/32;
    #   # set_real_ip_from 2803:f800::/32;
    #   # set_real_ip_from 2405:b500::/32;
    #   # set_real_ip_from 2405:8100::/32;
    #   # set_real_ip_from 2a06:98c0::/29;
    #   # set_real_ip_from 2c0f:f248::/32;
    #   # real_ip_header CF-Connecting-IP;
    #   # real_ip_recursive off;                  # CF 는 단일 IP 헤더라 recursive 불필요
    #
    # [예시 B] AWS ALB / VPC 내부 LB 뒤에서 운영
    #   - 신뢰 대역은 VPC CIDR 만 (예: 10.0.0.0/8 또는 더 좁게 ALB 가 위치한 서브넷).
    #     인터넷 측 IP 를 신뢰 대역에 넣으면 안 됨 (스푸핑 위험).
    #   - 헤더는 표준 X-Forwarded-For. ALB 는 마지막 hop 의 IP 를 append 형식으로 추가.
    #
    #   # set_real_ip_from 10.0.0.0/8;            # VPC 내부 대역만
    #   # real_ip_header X-Forwarded-For;
    #   # real_ip_recursive on;                   # ALB → 내부 proxy 다단 구조 대응
    #
    # [예시 C] 사내 nginx / HAProxy reverse-proxy 뒤
    #   - 신뢰 대역은 그 reverse-proxy 의 노드 IP / 서브넷만.
    #     절대 0.0.0.0/0 을 신뢰하지 말 것 (전체 인터넷이 X-Forwarded-For 위조 가능).
    #
    #   # set_real_ip_from 192.168.10.0/24;       # 사내 LB 노드 서브넷
    #   # real_ip_header X-Forwarded-For;
    #   # real_ip_recursive on;
    #
    # ▣ 활성화 후 동작 확인:
    #   1) curl -H "X-Forwarded-For: 1.2.3.4" http://<your-domain>/
    #   2) /log/nginx/<domain>_*_access.log 의 $remote_addr 컬럼에 1.2.3.4 가 찍히면 정상.
    #      여전히 LB IP 가 찍히면 set_real_ip_from 대역에 LB IP 가 포함됐는지 확인.
    #   3) 봇 차단 동작은 ngxblocker 가 새 IP 기준으로 자동 판정하므로 별도 reload 불필요
    #      (단, set_real_ip_from 자체 변경 시 nginx -s reload 필요).
    # -------------------------------------------------------------------------
    # (운영 환경에 맞춰 위 예시 중 하나를 선택해 주석 해제)


    # -------------------------------------------------------------------------
    # Bad Bot Blocker — globalblacklist.conf 가 $bad_bot, $bad_referer 등 변수를 정의.
    # /etc/nginx/ 직속 경로 사용 이유: compose 가 conf.d/ 를 통째로 mount 하므로
    #   image 의 conf.d/globalblacklist.conf 가 가려진다. /etc/nginx/ 는 mount 대상 아님.
    # 자동 갱신: 컨테이너 안 cron 이 6시간마다 update-ngxblocker -c /etc/nginx 실행.
    # -------------------------------------------------------------------------
    include /etc/nginx/globalblacklist.conf;

    # -------------------------------------------------------------------------
    # 도메인별 conf 로드
    # 주의: fastcgi_params 는 각 도메인 conf 의 PHP location 내부에서
    #       명시적으로 include 한다. (공통 nginx.conf 에는 두지 않는다)
    # -------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*.conf;
}
