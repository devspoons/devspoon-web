# ===============================================
# Production Level Nginx Configuration for PHP (HTTPS Template)
# 서버 사양: 쿼드코어 CPU, 4GB RAM, ~50 req/s
# 백엔드: PHP-FPM (PHP FastCGI Process Manager)
# ===============================================
#
# nginx_https_conf.sh 가 placeholder(webroot / portnumber / domain / appname / serviceport / filename)를
# 치환하여 conf.d/<filename>_php_ng_https.conf 로 생성한다.
# SSL 준비물:
#   - 인증서:   certbot certonly --webroot -w /www/certbot -d domain -d www.domain
#   - DH 파라미터: /etc/nginx/dhparam.pem — 이미지에 빌드 시 1회 생성되어 구워짐 (수동 생성 불필요)
#   - privkey.pem 권한 600 (chmod 600)

# ----- HTTP(80) → HTTPS(443) 리다이렉트 + ACME 챌린지 -----
server {
    listen       portnumber;
    server_name  domain www.domain;
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----- HTTPS(443) 메인 PHP 애플리케이션 -----
server {
    listen      443 ssl;
    http2       on;                          # nginx 1.25.1+ 권장 문법
    server_name domain www.domain;

    root        /www/webroot;

    # 악성 봇/스캐너 차단 — nginx-ultimate-bad-bot-blocker (mitchellkrogza) 사용.
    #   blockbots.conf : User-Agent / Referrer / Bad-IP 매칭 시 444 종료
    #   ddos.conf      : 비정상 다량 요청 차단
    # 차단 리스트는 cron(/usr/local/sbin/update-ngxblocker) 으로 6시간마다 갱신된다.
    include /etc/nginx/bots.d/blockbots.conf;
    include /etc/nginx/bots.d/ddos.conf;

    # ===== SSL/TLS =====
    ssl_certificate     /etc/letsencrypt/live/domain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domain/privkey.pem;
    ssl_dhparam         /etc/nginx/dhparam.pem;            # 이미지에 빌드 시 1회 생성되어 구워짐 (./ssl/dhparam 호스트 볼륨으로 백업/복원)

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
    ssl_ecdh_curve            secp384r1;

    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/domain/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ===== 보안 헤더 =====
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "frame-ancestors 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # ===== 성능 최적화 =====
    client_max_body_size 50M;                 # php.ini 의 upload_max_filesize / post_max_size 와 일치
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ===== 로깅 (영속 경로 /log/nginx/) =====
    access_log /log/nginx/filename.com.php_access_https.log main buffer=32k flush=5s;
    error_log  /log/nginx/filename.com.php_error_https.log warn;

    # ===== 라우팅 =====
    location / {
        autoindex off;
        index  index.php index.html index.htm;
        try_files $uri $uri/ /index.php?$args;

        # ----- DDoS 방어 (기본 비활성; nginx.conf 의 limit_req_zone/limit_conn_zone 주석 해제 후 사용) -----
        #limit_req  zone=general burst=20 nodelay;
        #limit_conn addr 10;
        #limit_except GET POST HEAD OPTIONS PUT DELETE {
        #    deny all;
        #}
    }

    # Let's Encrypt ACME 챌린지 (HTTPS 포트에서도 처리)
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /www/certbot;
        try_files $uri =404;
    }

    # ===== 정적 자산 캐싱 =====
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        gzip_static on;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        log_not_found off;
    }

    # ===== 보안 차단 규칙 =====
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* \.(log|binary|pem|enc|crt|conf|cnf|sql|sh|key|yml|yaml|toml|ini|env|lock|bak|backup|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* (composer\.(json|lock|phar)|package(-lock)?\.json|yarn\.lock|requirements\.txt|Pipfile(\.lock)?|pyproject\.toml|contributing\.md|license\.txt|readme\.(rst|md|txt)|copyright|artisan|gulpfile\.js|phpunit\.xml|access_log|error_log|gruntfile\.js)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; allow all; }

    # ===== 업로드 디렉터리 내 PHP 실행 차단 (웹셸 방어) =====
    location ~* /(?:uploads|default/files|data)/.*\.php$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===== PHP-FPM 처리 =====
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        if (!-f $document_root$fastcgi_script_name) {
            return 404;
        }
        include fastcgi_params;              # SCRIPT_FILENAME, PATH_INFO ... — fastcgi_pass 에 필수
        fastcgi_pass      appname:serviceport;   # 컨테이너 이름:포트로 직접 전달 (예: php-app:9000)
        fastcgi_index     index.php;

        fastcgi_buffering        on;         # ⚠ off 금지
        fastcgi_buffer_size      16k;
        fastcgi_buffers          16 16k;     # 256KB
        fastcgi_busy_buffers_size 32k;

        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    60s;
        fastcgi_read_timeout    60s;
    }
}
