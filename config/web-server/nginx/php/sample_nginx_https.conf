# =============================================================================
# Domain Sample (HTTP→HTTPS + HTTPS) — PHP-FPM 백엔드
# 서버 사양: 8 vCPU / 8 GB RAM
# 백엔드  : PHP-FPM
# 사용법  : nginx_https_conf.sh 가 본 파일의 토큰을 sed 치환하여
#           conf.d/{filename}_php_https_ng.conf 로 출력한다.
# 토큰    : portnumber, domain, webroot, appname, serviceport, filename
# 인증서  : letsencrypt.sh 가 발급/갱신한다
# =============================================================================

server {
    listen          portnumber;
    server_name     domain www.domain;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root         /www/certbot;
        try_files    $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen          443 ssl;
    http2           on;
    server_name     domain www.domain;

    root            /www/webroot;
    index           index.php index.html index.htm;

    # ---- SSL ----------------------------------------------------------------
    ssl_certificate         /etc/letsencrypt/live/domain/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/domain/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/domain/chain.pem;
    ssl_dhparam             /etc/ssl/certs/domain/dhparam.pem;

    ssl_session_cache       shared:SSL:50m;
    ssl_session_timeout     1h;
    ssl_session_tickets     off;

    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers             "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
    ssl_ecdh_curve          secp384r1:X25519;

    ssl_stapling            on;
    ssl_stapling_verify     on;

    # client_max_body_size 100M;

    # ---- 악성 봇 / DDoS 차단 (nginx-ultimate-bad-bot-blocker) ---------------
    # server 컨텍스트에 들어가는 ngxblocker 파일은 다음 2개뿐이다:
    #   · blockbots.conf : server-level `if ($bad_bot)` 검사 + 444 return
    #   · ddos.conf      : server-level limit_conn / limit_req directive (봇만 적용)
    # 나머지 bots.d/{whitelist,blacklist,bad-referrer,custom-bad-referrers}*.conf 는
    # globalblacklist.conf 가 http 컨텍스트 안의 map/geo 블록에서 자동으로 include
    # 한다. server 블록에 직접 include 하면 운영자가 항목을 추가하는 순간
    # `nginx -t` 가 실패하므로 절대 두지 말 것.
    # 자동 갱신: 컨테이너 안 cron 이 6시간마다 update-ngxblocker 실행
    include /etc/nginx/bots.d/blockbots.conf;
    include /etc/nginx/bots.d/ddos.conf;

    # ---- 보안 헤더 (기본 — 모든 도메인 공통 적용) ---------------------------
    # HSTS: HTTPS 강제. preload 키워드는 https://hstspreload.org 에 도메인 등록 후에
    #       유효. 등록 안 한 도메인엔 preload 만 빼서 사용해도 무방.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # CSP: 현재 frame-ancestors 만 지정 (clickjacking 방어).
    #      script-src / default-src 등 강화는 아래 "선택 보안 헤더" 절 참고.
    add_header Content-Security-Policy   "frame-ancestors 'self';" always;
    # MIME-type sniffing 방어
    add_header X-Content-Type-Options    "nosniff" always;
    # Referrer 정책: 같은 출처 → 전체 URL, 다른 출처 (https) → origin 만 전달
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ---- 보안 헤더 (선택 — 운영 정책 / 앱 호환성 확인 후 활성화) ------------
    #
    # ▣ X-Frame-Options
    #   - CSP frame-ancestors 의 구형 브라우저(IE11 / 옛 안드로이드 WebView) 호환 fallback.
    #   - 위 frame-ancestors 'self' 와 같은 의미가 되도록 SAMEORIGIN 사용 권장.
    #     iframe 자체를 전면 차단하려면 DENY.
    #   - 적용 조건: 현대 브라우저는 frame-ancestors 가 우선이므로, 구형 브라우저
    #     사용자가 있는 B2C 서비스에서만 가치 있음. B2B / 내부 도구라면 불필요할 수 있다.
    # # add_header X-Frame-Options "SAMEORIGIN" always;
    #
    # ▣ Permissions-Policy (구 Feature-Policy)
    #   - 브라우저 기능 (geolocation / camera / microphone / payment / usb 등) 을
    #     iframe 포함 명시적으로 비활성화. XSS 가 일어나도 카메라 접근 등이 차단됨.
    #   - 적용 조건: 앱이 해당 기능을 안 쓰는 게 확인된 경우 — 사용 중인 기능을
    #     deny 하면 사이트가 깨진다. 사용 기능은 self 로, 사용 안 하는 건 빈 괄호로.
    #   - 아래 값은 "모든 민감 기능 차단" 의 보수적 기본값.
    # # add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), autoplay=(), fullscreen=(self), picture-in-picture=()" always;
    #
    # ▣ Cross-Origin-Opener-Policy (COOP) — Spectre 사이드채널 격리
    #   - 브라우저가 cross-origin window 와의 메모리 공유를 차단 → SharedArrayBuffer
    #     사용 가능 + Spectre 류 사이드채널 차단.
    #   - 적용 조건: OAuth popup / Google Sign-In / 결제 popup 같은 cross-origin window
    #     통신을 쓰는 앱은 same-origin 으로 두면 통신이 깨진다 → same-origin-allow-popups 사용.
    #     쓰지 않는다면 same-origin 이 가장 안전.
    # # add_header Cross-Origin-Opener-Policy "same-origin" always;
    # # add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;   # popup 호환
    #
    # ▣ Cross-Origin-Resource-Policy (CORP)
    #   - 본 서버의 리소스를 다른 출처가 fetch / <img> / <script> 로 못 가져가도록 차단.
    #   - 적용 조건: 본 서버가 공개 CDN 역할을 하지 않을 때 (대부분 그렇다).
    #     CORP 를 same-site 이상으로 두면 임베드 hotlinking 도 차단.
    # # add_header Cross-Origin-Resource-Policy "same-origin" always;
    #
    # ▣ Content-Security-Policy 강화 (frame-ancestors 외 XSS 방어 추가)
    #   - script-src / style-src / default-src 등을 추가하면 inline-script 실행이
    #     제한되어 XSS 위험이 큰 폭으로 감소. 단 잘못 설정 시 즉시 사이트 깨짐.
    #   - 적용 절차 (운영 권장):
    #     1) 먼저 Content-Security-Policy-Report-Only 헤더로 30일 이상 운영하며
    #        report-uri 로 위반 리포트 수집 → 영향 받는 정상 리소스 식별
    #     2) report 가 충분히 안정된 후 위반을 모두 화이트리스트에 반영
    #     3) Report-Only 헤더를 Content-Security-Policy 헤더로 교체 (enforce 전환)
    #   - 아래 예시는 자체 호스팅 + 일부 CDN 만 허용하는 보수적 기본값. unsafe-inline 은
    #     XSS 방어를 사실상 무력화하므로, 부득이한 경우에만 nonce / hash 로 대체.
    # # add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' https://cdn.example.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; report-uri /csp-report;" always;

    access_log /log/nginx/filename.php_https_access.log main buffer=32k flush=5s;
    error_log  /log/nginx/filename.php_https_error.log  warn;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root         /www/certbot;
        try_files    $uri =404;
    }

    location / {
        autoindex off;

        # 프로젝트 정책: 글로벌 rate-limit 비활성 (ngxblocker 가 봇 전용 쓰로틀링 담당).
        # 도메인 단위 throttle 이 필요하면 해당 도메인 conf.d 파일 안에 고유 이름의
        # limit_conn_zone / limit_req_zone 을 정의한 뒤 location 에서만 호출하라.

        try_files $uri $uri/ /index.php?$args;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires     max;
        add_header  Cache-Control "public, max-age=31536000, immutable";
        access_log  off;
        log_not_found off;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(log|binary|pem|enc|crt|conf|cnf|sql|sh|key|yml|yaml|toml|ini|env|lock|bak|backup|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* (composer\.(json|lock|phar)|package(-lock)?\.json|yarn\.lock|requirements\.txt|Pipfile(\.lock)?|pyproject\.toml|poetry\.lock|gulpfile\.js|gruntfile\.js|phpunit\.xml|artisan)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log    off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log    off;
        allow all;
    }

    location ~* /(?:uploads|default/files|data)/.*\.php$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;

        if (!-f $document_root$fastcgi_script_name) {
            return 404;
        }

        include /etc/nginx/fastcgi_params;

        # HTTPS 정보를 백엔드에 명시
        fastcgi_param HTTPS         on;

        fastcgi_pass        appname:serviceport;
        fastcgi_index       index.php;

        fastcgi_buffering   on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers     32 16k;

        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    60s;
        fastcgi_read_timeout    60s;

        keepalive_requests  1000;
    }
}
