# ===============================================
# Production Level Nginx Configuration for PHP (HTTP-Only Template)
# 서버 사양: 쿼드코어 CPU, 4GB RAM, ~50 req/s
# 백엔드: PHP-FPM (PHP FastCGI Process Manager)
# ===============================================
#
# nginx_http_conf.sh 가 placeholder(webroot / portnumber / domain / appname / serviceport / filename)를
# 치환하여 conf.d/<filename>_php_ng_http.conf 로 생성한다. (HTTPS 버전은 sample_nginx_https.conf / nginx_https_conf.sh)

# HTTP 서버 블록 - 메인 PHP 애플리케이션
# 주의: SSL/TLS 암호화 없음, 프로덕션은 sample_nginx_https.conf 권장
server {
    listen       portnumber;
    server_name  domain www.domain;

    # 웹 루트 (정적 파일 및 PHP 스크립트의 기본 경로)
    root         /www/webroot;

    # 악성 봇/스캐너 차단 — nginx-ultimate-bad-bot-blocker (mitchellkrogza) 사용.
    #   blockbots.conf : User-Agent / Referrer / Bad-IP 매칭 시 444 종료
    #   ddos.conf      : 비정상 다량 요청 차단
    # 차단 리스트는 cron(/usr/local/sbin/update-ngxblocker) 으로 6시간마다 갱신된다.
    include /etc/nginx/bots.d/blockbots.conf;
    include /etc/nginx/bots.d/ddos.conf;
    # ===== 보안 헤더 (HTTP 환경에서 유효한 것만; HSTS 는 HTTPS 전용이라 제외) =====
    add_header Content-Security-Policy "frame-ancestors 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===== 성능 최적화 =====
    # php.ini 의 upload_max_filesize / post_max_size 와 일치시킬 것
    client_max_body_size 50M;
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ===== 로깅 (영속 경로 /log/nginx/; 'main' 포맷은 nginx.conf 정의) =====
    access_log /log/nginx/filename.com.php_access_http.log main buffer=32k flush=5s;
    error_log  /log/nginx/filename.com.php_error_http.log warn;

    # ===== 라우팅 (정적 파일 → 없으면 index.php; WordPress/Laravel 등 프레임워크 지원) =====
    location / {
        autoindex off;
        index  index.php index.html index.htm;
        try_files $uri $uri/ /index.php?$args;

        # ----- DDoS 방어: 요청 속도 / 동시 연결 수 제한 (기본 비활성) -----
        # 사용하려면 nginx.conf 의 http 블록에서 limit_req_zone / limit_conn_zone 주석을 해제할 것
        # (한쪽만 켜면 "unknown limit_req zone "general"" 으로 기동 실패. 산정 근거는 nginx.conf 의 해당 주석 참고).
        #limit_req  zone=general burst=20 nodelay;
        #limit_conn addr 10;
        # HTTP 메서드 제한 (API 서버라면 주석 해제) — TRACE/CONNECT 등 비표준 차단
        #limit_except GET POST HEAD OPTIONS PUT DELETE {
        #    deny all;
        #}
    }

    # Let's Encrypt ACME 챌린지 (HTTPS 전환/갱신용)
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /www/certbot;   # 고정 ACME 챌린지 루트 (letsencrypt.sh -w 와 동일; 앱 루트로 치환되면 안 됨)
        try_files $uri =404;
    }

    # ===== 정적 자산 캐싱 =====
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        gzip_static on;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";    # 버전화된 파일 가정; 변경되는 파일은 캐싱 주기 축소
        access_log off;
        log_not_found off;
    }

    # ===== 보안 차단 규칙 =====
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* \.(log|binary|pem|enc|crt|conf|cnf|sql|sh|key|yml|yaml|toml|ini|env|lock|bak|backup|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    location ~* (composer\.(json|lock|phar)|package(-lock)?\.json|yarn\.lock|requirements\.txt|Pipfile(\.lock)?|pyproject\.toml|contributing\.md|license\.txt|readme\.(rst|md|txt)|copyright|artisan|gulpfile\.js|phpunit\.xml|access_log|error_log|gruntfile\.js)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; allow all; }

    # ===== 업로드 디렉터리 내 PHP 실행 차단 (웹셸 업로드 공격 방어 — 치명적) =====
    location ~* /(?:uploads|default/files|data)/.*\.php$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===== PHP-FPM 처리 =====
    location ~ [^/]\.php(/|$) {
        # /script.php/path/info → SCRIPT_FILENAME=/script.php, PATH_INFO=/path/info
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;

        # 실제 PHP 파일 존재 확인 (없으면 404) — 임의 코드 실행 방지. php.ini 의 cgi.fix_pathinfo=0 과 함께 사용.
        if (!-f $document_root$fastcgi_script_name) {
            return 404;
        }

        # FastCGI 파라미터(SCRIPT_FILENAME, PATH_INFO ...) — fastcgi_pass 에 필수.
        # (nginx.conf 의 http 블록에서 일괄 include 하지 않고 여기서 include 하는 것이 관례)
        include fastcgi_params;

        # 백엔드 — 컨테이너 이름:포트로 직접 전달 (nginx_http_conf.sh 가 appname/serviceport 치환)
        #   예) Docker: php-app:9000;  Unix 소켓: unix:/run/php/php-fpm.sock;
        fastcgi_pass     appname:serviceport;
        fastcgi_index    index.php;

        # 응답 버퍼링 — ⚠ off 금지 (slow-read 클라이언트로부터 PHP-FPM 워커 보호)
        fastcgi_buffering        on;
        fastcgi_buffer_size      16k;        # 응답 헤더용
        fastcgi_buffers          16 16k;     # 응답 본문용 (16 × 16KB = 256KB) — 일반 PHP 응답에 충분
        fastcgi_busy_buffers_size 32k;

        # 타임아웃 — php.ini 의 max_execution_time 과 조율
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    60s;
        fastcgi_read_timeout    60s;
    }
}
