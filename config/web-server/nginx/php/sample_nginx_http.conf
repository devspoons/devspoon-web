# =============================================================================
# Domain Sample (HTTP only) — PHP-FPM 백엔드
# 서버 사양: 8 vCPU / 8 GB RAM
# 백엔드  : PHP-FPM
# 사용법  : nginx_http_conf.sh 가 본 파일의 토큰을 sed 치환하여
#           conf.d/{filename}_php_ng_http.conf 로 출력한다.
#           (HTTPS 버전은 sample_nginx_https.conf + nginx_https_conf.sh)
# 토큰    : portnumber, domain, webroot, appname, serviceport, filename
# =============================================================================

server {
    listen          portnumber;
    server_name     domain www.domain;

    root            /www/webroot;
    index           index.php index.html index.htm;

    # client_max_body_size 100M;

    # ---- 악성 봇 / DDoS 차단 (nginx-ultimate-bad-bot-blocker) ---------------
    # server 컨텍스트에 들어가는 ngxblocker 파일은 다음 2개뿐이다:
    #   · blockbots.conf : server-level `if ($bad_bot)` 검사 + 444 return
    #   · ddos.conf      : server-level limit_conn / limit_req directive (봇만 적용)
    # 나머지 bots.d/{whitelist,blacklist,bad-referrer,custom-bad-referrers}*.conf 는
    # globalblacklist.conf 가 http 컨텍스트 안의 map/geo 블록에서 자동으로 include
    # 한다. server 블록에 직접 include 하면 운영자가 항목을 추가하는 순간
    # `nginx -t` 가 실패하므로 절대 두지 말 것.
    # 자동 갱신: 컨테이너 안 cron 이 6시간마다 update-ngxblocker 실행
    include /etc/nginx/bots.d/blockbots.conf;
    include /etc/nginx/bots.d/ddos.conf;

    # ---- 보안 헤더 (HTTP 환경) ----------------------------------------------
    add_header Content-Security-Policy "frame-ancestors 'self';" always;
    add_header X-Content-Type-Options  "nosniff" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ---- 로그 ----------------------------------------------------------------
    access_log /log/nginx/filename.php_http_access.log main buffer=32k flush=5s;
    error_log  /log/nginx/filename.php_http_error.log  warn;

    # ---- ACME 챌린지 ---------------------------------------------------------
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root         /www/certbot;
        try_files    $uri =404;
    }

    # ---- 메인 라우팅 (PHP 프레임워크: WordPress/Laravel 등 fallback) ---------
    location / {
        autoindex off;

        # 프로젝트 정책: 글로벌 rate-limit 비활성 (ngxblocker 가 봇 전용 쓰로틀링 담당).
        # 도메인 단위 throttle 이 필요하면 해당 도메인 conf.d 파일 안에 고유 이름의
        # limit_conn_zone / limit_req_zone 을 정의한 뒤 location 에서만 호출하라.

        try_files $uri $uri/ /index.php?$args;
    }

    # ---- 정적 자원 캐싱 ------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires     max;
        add_header  Cache-Control "public, max-age=31536000, immutable";
        access_log  off;
        log_not_found off;
    }

    # ---- 보안 차단 ----------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(log|binary|pem|enc|crt|conf|cnf|sql|sh|key|yml|yaml|toml|ini|env|lock|bak|backup|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* (composer\.(json|lock|phar)|package(-lock)?\.json|yarn\.lock|requirements\.txt|Pipfile(\.lock)?|pyproject\.toml|poetry\.lock|gulpfile\.js|gruntfile\.js|phpunit\.xml|artisan)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log    off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log    off;
        allow all;
    }

    # ---- 업로드 디렉터리 내 PHP 실행 차단 (웹셸 방어) ------------------------
    location ~* /(?:uploads|default/files|data)/.*\.php$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- PHP 처리 ------------------------------------------------------------
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;

        # 실재하지 않는 .php 요청 차단 (cgi.fix_pathinfo=0 과 함께 임의 코드 실행 방지)
        if (!-f $document_root$fastcgi_script_name) {
            return 404;
        }

        # PHP-FPM 표준 파라미터 + httpoxy 완화
        include /etc/nginx/fastcgi_params;

        fastcgi_pass        appname:serviceport;
        fastcgi_index       index.php;

        fastcgi_buffering   on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers     32 16k;             # 512KB — PHP 응답에 적합한 균형값

        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    60s;
        fastcgi_read_timeout    60s;

        # keepalive_requests 0 은 비표준이므로 명시값으로 교정
        keepalive_requests  1000;
    }
}
