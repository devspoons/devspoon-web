[uwsgi]
# =====================================================
# uWSGI Configuration (Django sync)
# 환경: Production
# 서버 사양: 8 core / 8 GB RAM
# 배포 정책: 수동 stop/start (무중단 미고려)
# 프록시: Nginx
# =====================================================

project = django_sample

# ----- 권한 (least-privilege) -----
# 컨테이너 안에서 uwsgi 마스터는 root 가 아닌 www-data 로 떨어진다.
#  - master 는 root 로 기동되어 listen 80 미만 등 권한 작업을 수행할 수 있으나
#    본 스택은 TCP 8000 으로 nginx upstream 만 받기 때문에 root 가 필요 없음.
#  - PHP-FPM 이 www-data 로 떨어지는 것과 대칭 유지 → 컨테이너 내부 RCE 시
#    blast radius 를 사용자 권한 수준으로 제한.
#  - username 키는 master 의 표시용이고 실제 권한 강등은 uid/gid 가 담당한다.
uid = www-data
gid = www-data

# Django 프로젝트 경로 (compose working_dir 와 일치)
chdir = /www/django_sample

# Django wsgi 엔트리포인트
module = config.wsgi:application

# ----- Master / Worker -----
# master: 워커 라이프사이클 관리 (필수)
master = true

# 산정:
#   - sync 워커 8개 (cores 매칭) × threads 4 = 동시 슬롯 32
#   - 8GB RAM 환경: 워커당 ~200-300MB (Django 기준) → 8 × 250MB = 2GB
processes = 8
threads = 4

# ----- Hot reload (프로덕션 금지) -----
# 8c8g 운영에서 py-autoreload 는 CPU 5-10% / 메모리 50-100MB 추가 + 불안정성
# 무중단 미고려이므로 더더욱 불필요 → 0 으로 강제 고정
py-autoreload = 0

# ----- Socket -----
# Nginx upstream 으로 TCP 8000 사용 (compose 와 동일)
socket = :8000
socket-timeout = 30
http-timeout = 60

# 백로그 (Accept Queue) — 시스템 net.core.somaxconn 동시 조정 필요
listen = 2048

# 시그널 / 에러 흐름 안정화
ignore-sigpipe = true
ignore-write-errors = true
disable-write-exception = true

# 소켓 권한
#  - TCP socket(socket = :8000) 사용 중이므로 chmod-socket 은 무의미 → 주석 처리.
#  - 향후 unix socket (예: /tmp/uwsgi.sock) 으로 전환 시:
#      socket = /tmp/uwsgi.sock
#      chmod-socket = 660       # 0666 은 권한 과다, nginx ↔ uwsgi 만 통신하므로 0660 충분
#      chown-socket = www-data:www-data
chown-socket = www-data:www-data
# chmod-socket = 660

# 종료 시 소켓 정리
vacuum = true

# 컨테이너 / systemd 호환: SIGTERM 으로 즉시 종료
die-on-term = true

# ----- Threads & GIL -----
# Django ORM 등 thread-safe 코드 사용 → enable-threads 필수
enable-threads = true

# 워커 fork 후 별도 인터프리터 미생성 (메모리 절감)
single-interpreter = true

# 수동 stop/start 배포 → 메모리 절감 우선 (master 에서 로드 후 fork)
# - graceful reload 불필요 시 lazy-apps=false 로 메모리 20-40% 절감
lazy-apps = false

# ----- 리소스 / 메모리 누수 방어 -----
# harakiri: 요청 처리 최대 시간 (초). 초과 시 워커 강제 재시작
harakiri = 60
harakiri-verbose = true

# 워커별 누적 요청 한계 — 도달 시 자동 재시작 (메모리 누수 방어)
max-requests = 2000
max-requests-delta = 200

# 메모리 임계치 초과 시 워커 재시작 (RSS, 단위: byte / 800MB)
reload-on-rss = 800

# ----- 로그 (모든 로그는 /log/uwsgi/ 식별 폴더에 일원화) -----
# daemonize 는 컨테이너 환경에서 비활성화한다.
# - 호스트 systemd 라면 마스터를 background 로 fork 하는 것이 자연스럽지만,
#   compose 는 PID 1 이 살아 있어야 컨테이너가 유지된다. daemonize 가 활성이면
#   uwsgi 마스터가 fork 후 부모(PID 1)가 종료 → 컨테이너 종료 → restart 루프.
# - 로그는 logto 가 같은 폴더에 동일 패턴으로 기록하므로 운영상 손실 없음.
# daemonize = /log/uwsgi/%(project)-daemonize-uwsgi.log
logto     = /log/uwsgi/%(project)-uwsgi.log

# 로그 타임스탬프
log-date = true

# 액세스 로그 분리 (logrotate 가 /log/uwsgi/*.log 패턴 매칭)
req-logger = file:/log/uwsgi/%(project)-uwsgi_access.log

# ----- 성능 -----
# 정적 파일 캐시 (워커 메모리 절감)
buffer-size = 32768

# 슬로우 리퀘스트 추적 (선택 활성)
# log-slow = 5000  # 5초 초과 요청 로깅
