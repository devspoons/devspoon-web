[uwsgi]
project = django_sample

# 권한 강하 (privilege drop) — uwsgi 마스터가 root 로 기동된 경우 워커는 unprivileged 사용자로 떨어뜨린다.
# php-fpm 의 www-data 와 동일한 정책. 운영 환경에서 root 워커는 least-privilege 위반.
uid = www-data
gid = www-data
#base =/www/django_sample/django_sample

# Django-related settings
# the base directory (full path)
chdir = /www/django_sample

# Django's wsgi file
module = config.wsgi:application


# python path
#home            = /home/linku/.pyenv/versions/LinkU/

# apt-get install uwsgi uwsgi-plugin-python3
# after installed above command, setting below value
#plugin = python38

# the virtualenv (full path)
#virtualenv = /home/linku/.pyenv/versions/LinkU/

#django argument
#env = DJANGO_SETTINGS_MODULE=conf.settings

# process-related settings
# tell uWSGI to start a master node to serve requests
master = true

# application name
#callable=app

# Hot reload — 운영에서는 반드시 0. 파일 변경 감지로 CPU 오버헤드 + 의도치 않은 워커 재시작이 발생.
# 개발 환경에서만 1 로 임시 활성화하고 즉시 0 으로 되돌릴 것.
py-autoreload = 0

# maximum number of worker processes
processes = 4
#threads = 2

# the socket (use the full path to be safe
#socket= /home/linku/LinkU/linku_backend/linku.sock

# Nginx to handle actual client connections, which will then pass requests to uWSGI.
socket = :8000

socket-timeout = 3000
http-timeout = 3000

ignore-sigpipe = true
ignore-write-errors = true
disable-write-exception = true

# TCP socket(`socket = :8000`) 사용 중이므로 chown-socket / chmod-socket 은 의미 없음 (유닉스 소켓일 때만 유효).
# 유닉스 소켓으로 전환 시 활성화 — chmod 666 은 너무 관대(같은 호스트의 어느 프로세스든 접근 가능). 0660 권장.
#chown-socket = www-data:www-data
#chmod-socket = 0660

# clean the socket when processes stop
# clean up the socket when the process stops by adding the vacuum option:
vacuum = true

# use die-on-term to communicate with Ubuntu versions using Upstart initialisations: see:
# http://uwsgi-docs.readthedocs.io/en/latest/Upstart.html?highlight=die%20on%20term
# https://www.digitalocean.com/community/tutorials/how-to-set-up-uwsgi-and-nginx-to-serve-python-apps-on-ubuntu-14-04
die-on-term = true

# daemonize 는 컨테이너에서 사용 금지 — uwsgi 가 fork 후 부모(PID 1) 가 종료되어 컨테이너가 즉시 멈춘다.
# foreground 로 두고 logto 로 로그 파일에 출력 (아래 logto 라인 사용).
#daemonize = /log/uwsgi/%(project)-daemonize-uwsgi.log

# process pid
#pidfile=/tmp/linku_backend.pid

# newrelic settings
enable-threads = true
single-interpreter = true
lazy-apps = true

logto = /log/uwsgi/%(project)-uwsgi.log

# place timestamps into log
log-date = true

# ============================================================================
# 네이티브 로그 회전 (uwsgi 공식 지원: log-maxsize / log-reopen)
#   - 외부 logrotate 의존 제거. 회전 시 <logfile>.<unix-timestamp> 로 이름 변경.
#   - 보존(retention) / 압축은 uwsgi 가 제공하지 않음. 장기 운영 시 호스트 측에서
#     find /log/uwsgi -name '*.log.[0-9]*' -mtime +30 -delete 같은 정리 필요.
# ============================================================================
log-maxsize = 104857600         # 100 MB 초과 시 회전 (기존 logrotate 정책과 동일 사이즈)
log-reopen  = true              # SIGHUP / SIGUSR1 수신 시 로그 파일 재오픈 (외부 강제 회전 대응)
