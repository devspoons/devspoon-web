[sample]

; ==========================================
; PHP-FPM 풀 설정 (프로덕션 서비스용 샘플)
; 서버 사양: 8 core / 8 GB RAM
; 배포 정책: 수동 stop/start (무중단 미고려)
; ==========================================

; -------------------------------------------------
; 프로세스 소유자 설정 - 웹서버 프로세스와 일치시켜야 함
; 보안상 root로 실행하지 않도록 주의
user = www-data
group = www-data

; -------------------------------------------------
; 리스닝 소켓 또는 포트 설정
; TCP 포트(9000) 혹은 유닉스 소켓을 선택 가능
; 유닉스 소켓이 더 빠르며, 단일 서버 내부 통신에 권장
listen = [::]:9000
; listen = /run/php/php-fpm.sock

; -------------------------------------------------
; 소켓 퍼미션 설정 (소켓 모드로 사용할 경우 활성화)
; 권한 문제 발생 시 주석 해제하여 조정
; listen.owner = www-data
; listen.group = www-data
; listen.mode = 0660

; Accept Queue (커널 net.core.somaxconn 동시 조정 필요)
listen.backlog = 2048

; -------------------------------------------------
; 프로세스 관리 (dynamic)
; 산정 (8c8g):
;   - PHP 워커당 메모리: 60-80MB
;   - 가용 메모리 6GB 중 절반 3GB 를 PHP 에 할당 → 40 워커 * 80MB = 3.2GB
;   - start_servers = cores = 8, min_spare = 8, max_spare = 24
;   - 메모리 누수 방어: pm.max_requests = 500
pm = dynamic
pm.max_children = 40
pm.start_servers = 8
pm.min_spare_servers = 8
pm.max_spare_servers = 24
pm.process_idle_timeout = 10s
pm.max_requests = 500

; -------------------------------------------------
; PHP-FPM status / ping (헬스체크, 모니터링)
pm.status_path = /status
ping.path = /ping
ping.response = pong

; -------------------------------------------------
; 환경변수 초기화 설정
; clear_env=no로 설정하면 시스템 환경변수 사용 가능 (예: PATH)
clear_env = no

; -------------------------------------------------
; PHP 런타임 제어 (보안 및 성능 관련)
php_admin_value[session.cookie_httponly] = 1    ; XSS 방지를 위한 세션 쿠키 보호
catch_workers_output = yes                      ; PHP 에러를 워커 로그로 전달
php_admin_flag[log_errors] = on                 ; PHP 오류 로그 활성화
php_admin_value[error_log] = /log/php-fpm/www-error.log ; 오류 로그 경로

; -------------------------------------------------
; 액세스 로그 설정
; 요청별 로그를 남겨 요청 추적 및 디버깅에 유용
access.log = /log/php-fpm/access.log
access.format = "%R - %u %t \"%m %r%Q%q\" %s %f %{mili}d %{kilo}M %C%%"

; -------------------------------------------------
; 슬로우 요청 추적 로그 (성능 이슈 진단용)
slowlog = /log/php-fpm/slow.log
request_slowlog_timeout = 5s

; 요청당 최대 처리 시간 (FastCGI hang 방지)
request_terminate_timeout = 60s

; -------------------------------------------------
; PHP 리소스 제한 (8c8g 기준 보수적 산정)
php_admin_value[memory_limit] = 256M
php_admin_value[max_execution_time] = 60
php_admin_value[max_input_time] = 120
php_admin_value[post_max_size] = 25M
php_admin_value[upload_max_filesize] = 25M
