# =============================================================================
# nginx_uwsgi 스택
#
# - uwsgi 전용 이미지(devspoon-uwsgi-app:latest) — 다른 Python 스택과 다른 Dockerfile
#   (docker/uwsgi/) 사용. 본 스택에서는 uwsgi-app 만 build 정의를 두고 celery /
#   celery-beat 는 image 만 참조하여 재빌드를 피한다.
# - 자격증명 fail-fast / redis healthcheck / 컨테이너명 기반 의존성 — nginx_gunicorn
#   compose 와 동일 정책. 자세한 설명은 그 파일을 참조.
# =============================================================================

services:
  webserver:
    build: ../../../docker/nginx/
    image: devspoon-nginx:latest
    logging: &log_opts
      driver: "${LOG_DRIVER:-json-file}"
      options:
        max-file: "${LOG_OPT_MAXF:-5}"
        max-size: "${LOG_OPT_MAXS:-100m}"
    working_dir: /application
    container_name: nginx-uwsgi-webserver
    volumes:
      - ../../../www:/www
      - ../../../script/:/script/
      - ../../../config/web-server/nginx/uwsgi/conf.d/:/etc/nginx/conf.d/
      - ../../../config/web-server/nginx/uwsgi/nginx_conf/nginx.conf:/etc/nginx/nginx.conf
      - ../../../config/web-server/nginx/uwsgi/proxy_params/proxy_params:/etc/nginx/proxy_params
      - ./ssl/certs/:/etc/ssl/certs/
      - ./ssl/letsencrypt/:/etc/letsencrypt/
      - ../../../log/:/log/
      - ../../../script/logrotate/nginx/nginx:/etc/logrotate.d/nginx
    ports:
      - 80:80
      - 443:443
    environment:
      TZ: "Asia/Seoul"
    restart: always
    # ulimits — 의도적으로 비활성화 상태. 활성화 절차는 .env 의
    # ULIMIT_NOFILE_SOFT / ULIMIT_NOFILE_HARD 와 nginx_gunicorn compose 의 동일 블록 참조.
    # ulimits:
    #   nofile:
    #     soft: ${ULIMIT_NOFILE_SOFT:-65535}
    #     hard: ${ULIMIT_NOFILE_HARD:-65535}

  uwsgi-app:
    build: ../../../docker/uwsgi/
    image: devspoon-uwsgi-app:latest
    logging: *log_opts
    # working_dir 을 프로젝트 루트로 통일 — uv 가 pyproject.toml 을 자동 인식하게 함.
    # uwsgi 자체는 ini 의 chdir 지시자로 다시 /www/django_sample 로 이동.
    working_dir: /www/${PROJECT_DIR}
    container_name: uwsgi-app
    volumes:
      - ../../../www:/www
      - ../../../config/app-server/uwsgi/uwsgi.ini:/application/uwsgi.ini
      - ../../../log:/log
      - ../../../script/logrotate/uwsgi/uwsgi:/etc/logrotate.d/uwsgi
    command: bash -c "uv sync --inexact --extra uwsgi --extra celery && exec uwsgi --ini /application/uwsgi.ini"
    environment:
      TZ: "Asia/Seoul"
    restart: always
    depends_on:
      redis:
        condition: service_healthy

  # CELERY_BROKER_URL 은 REDIS_PASSWORD 로부터 합성 (SSOT) — drift 차단.
  # 자세한 설명은 nginx_gunicorn/docker-compose.yml 참조.
  celery:
    image: devspoon-uwsgi-app:latest
    logging: *log_opts
    working_dir: /www/${PROJECT_DIR}
    container_name: celery-app
    volumes:
      - ../../../www:/www
      - ../../../log:/log
      - ../../../script/logrotate/uwsgi/celery/uwsgi-celery:/etc/logrotate.d/uwsgi-celery
    command: bash -c "uv sync --inexact --extra uwsgi --extra celery && \
      exec celery -A config worker \
      --loglevel=INFO \
      --concurrency=8 \
      --max-tasks-per-child=2000 \
      --logfile=/log/uwsgi/celery/worker-%n%I.log"
    environment:
      TZ: "Asia/Seoul"
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/3
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      uwsgi-app:
        condition: service_started
    profiles:
      - celery

  celery-beat:
    image: devspoon-uwsgi-app:latest
    logging: *log_opts
    working_dir: /www/${PROJECT_DIR}
    container_name: celerybeat-app
    volumes:
      - ../../../www:/www
      - ../../../log:/log
      - ../../../script/logrotate/uwsgi/celerybeat/uwsgi-celerybeat:/etc/logrotate.d/uwsgi-celerybeat
    command: bash -c "uv sync --inexact --extra uwsgi --extra celery && \
      exec celery -A config beat \
      --loglevel=INFO \
      --scheduler django_celery_beat.schedulers:DatabaseScheduler \
      --logfile=/log/uwsgi/celerybeat/celerybeat.log"
    environment:
      TZ: "Asia/Seoul"
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/3
    restart: always
    depends_on:
      celery:
        condition: service_started
    profiles:
      - celery

  flower:
    image: mher/flower:2.0.1
    logging: *log_opts
    container_name: flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/3
      - FLOWER_BASIC_AUTH=${FLOWER_ID:?FLOWER_ID must be set}:${FLOWER_PWD:?FLOWER_PWD must be set}
    restart: always
    depends_on:
      celery-beat:
        condition: service_started
    profiles:
      - celery

  redis:
    image: redis:7.4-alpine
    logging: *log_opts
    container_name: redis_db
    # ports:
    #   - 6379:6379
    volumes:
      - ./redis/data:/data
      - ./redis/conf/:/usr/local/etc/redis/
    labels:
      - "name=redis"
      - "mode=standalone"
    environment:
      TZ: "Asia/Seoul"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    restart: always
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
