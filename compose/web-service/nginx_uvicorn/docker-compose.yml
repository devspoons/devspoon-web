# =============================================================================
# nginx_uvicorn 스택
#
# - 동일 Python 앱 이미지 (devspoon-py-app:latest) 를 nginx_gunicorn / nginx_daphne
#   와 공유한다. uvicorn variant = gunicorn 마스터 + UvicornWorker 이므로 별도 이미지
#   불필요. 본 스택에서는 uvicorn-app 만 build 정의를 두고 celery / celery-beat 는
#   image 만 참조하여 재빌드를 피한다.
# - 자격증명 fail-fast / redis healthcheck / 컨테이너명 기반 의존성 — nginx_gunicorn
#   compose 와 동일 정책. 자세한 설명은 그 파일을 참조.
# =============================================================================

services:
  webserver:
    build: ../../../docker/nginx/
    image: devspoon-nginx:latest
    logging: &log_opts
      driver: "${LOG_DRIVER:-json-file}"
      options:
        max-file: "${LOG_OPT_MAXF:-5}"
        max-size: "${LOG_OPT_MAXS:-100m}"
    working_dir: /application
    container_name: nginx-uvicorn-webserver
    volumes:
      - ../../../www:/www
      - ../../../script/:/script/
      - ../../../config/web-server/nginx/uvicorn/conf.d/:/etc/nginx/conf.d/
      - ../../../config/web-server/nginx/uvicorn/nginx_conf/nginx.conf:/etc/nginx/nginx.conf
      - ../../../config/web-server/nginx/uvicorn/proxy_params/proxy_params:/etc/nginx/proxy_params
      # dhparam 백업/복원 — 이미지에 구운 /etc/nginx/dhparam.pem 을 여기에 백업/복원한다.
      # docker compose down 후 up 시 백업본이 있으면 그대로 복원, 없으면(최초 기동) 이미지본을 백업.
      # (과거의 ./ssl/certs:/etc/ssl/certs 는 시스템 CA 번들을 가려 certbot 을 깨뜨려 제거)
      - ./ssl/dhparam/:/etc/nginx/dhparam-backup/
      - ./ssl/letsencrypt/:/etc/letsencrypt/
      - ../../../log/:/log/
      - ../../../script/logrotate/nginx/nginx:/etc/logrotate.d/nginx
    ports:
      - 80:80
      - 443:443
    environment:
      TZ: "Asia/Seoul"
    restart: always
    # webserver 는 uvicorn-app(8000) + redis(6379) 가 healthy 가 되어야 의미가 있다.
    # service_healthy 조건으로 race(앱 부팅 전에 nginx 가 502 를 뱉는 구간) 을 차단.
    depends_on:
      uvicorn-app:
        condition: service_healthy
      redis:
        condition: service_healthy
    # ulimits — 의도적으로 비활성화 상태. 활성화 절차는 .env 의
    # ULIMIT_NOFILE_SOFT / ULIMIT_NOFILE_HARD 와 nginx_gunicorn compose 의 동일 블록 참조.
    # ulimits:
    #   nofile:
    #     soft: ${ULIMIT_NOFILE_SOFT:-65535}
    #     hard: ${ULIMIT_NOFILE_HARD:-65535}

  uvicorn-app:
    build: ../../../docker/gunicorn/
    image: devspoon-py-app:latest
    logging: *log_opts
    working_dir: /www/${PROJECT_DIR}
    container_name: uvicorn-app
    volumes:
      - ../../../www:/www
      - ../../../log:/log
      - ../../../config/app-server/uvicorn/:/uvicorn
      - ../../../script/logrotate/uvicorn/uvicorn:/etc/logrotate.d/uvicorn
    # uv 네이티브 흐름 — uvicorn extra 가 gunicorn 도 포함 (gunicorn + UvicornWorker).
    # chown: UvicornWorker 가 www-data 로 강하(uvicorn.conf.py 의 user/group)되므로,
    #        앱이 쓰는 SQLite db / 미디어 등 /www/${PROJECT_DIR} 를 www-data 소유로 맞춘다.
    command: bash -c "chown -R www-data:www-data /www/${PROJECT_DIR} && uv sync --inexact --extra uvicorn --extra celery && exec gunicorn -c /uvicorn/uvicorn.conf.py"
    environment:
      TZ: "Asia/Seoul"
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    # TCP 8000 이 listen 상태인지 bash 내장 /dev/tcp 로 확인 (의존성 추가 없음).
    # uvicorn.conf.py 가 0.0.0.0:8000 으로 bind — README §1 워커 가이드 참조.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8000' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # CELERY_BROKER_URL 은 REDIS_PASSWORD 로부터 합성 (SSOT) — drift 차단.
  # 자세한 설명은 nginx_gunicorn/docker-compose.yml 참조.
  celery:
    image: devspoon-py-app:latest
    logging: *log_opts
    working_dir: /www/${PROJECT_DIR}
    container_name: celery-app
    volumes:
      - ../../../www:/www
      - ../../../log:/log
      - ../../../script/logrotate/uvicorn/celery/uvicorn-celery:/etc/logrotate.d/uvicorn-celery
    command: bash -c "uv sync --inexact --extra uvicorn --extra celery && \
      exec celery -A config worker \
      --loglevel=INFO \
      --concurrency=8 \
      --max-tasks-per-child=2000 \
      --logfile=/log/uvicorn/celery/worker-%n%I.log"
    environment:
      TZ: "Asia/Seoul"
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/3
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      uvicorn-app:
        condition: service_started
    profiles:
      - celery

  celery-beat:
    image: devspoon-py-app:latest
    logging: *log_opts
    working_dir: /www/${PROJECT_DIR}
    container_name: celerybeat-app
    volumes:
      - ../../../www:/www
      - ../../../log:/log
      - ../../../script/logrotate/uvicorn/celerybeat/uvicorn-celerybeat:/etc/logrotate.d/uvicorn-celerybeat
    command: bash -c "uv sync --inexact --extra uvicorn --extra celery && \
      exec celery -A config beat \
      --loglevel=INFO \
      --scheduler django_celery_beat.schedulers:DatabaseScheduler \
      --logfile=/log/uvicorn/celerybeat/celerybeat.log"
    environment:
      TZ: "Asia/Seoul"
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/3
    restart: always
    depends_on:
      celery:
        condition: service_started
    profiles:
      - celery

  flower:
    image: mher/flower:2.0.1
    logging: *log_opts
    container_name: flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/3
      - FLOWER_BASIC_AUTH=${FLOWER_ID:?FLOWER_ID must be set}:${FLOWER_PWD:?FLOWER_PWD must be set}
    restart: always
    depends_on:
      celery-beat:
        condition: service_started
    profiles:
      - celery

  redis:
    image: redis:7.4-alpine
    logging: *log_opts
    container_name: redis_db
    # ports:
    #   - 6379:6379
    volumes:
      - ./redis/data:/data
      - ./redis/conf/:/usr/local/etc/redis/
    labels:
      - "name=redis"
      - "mode=standalone"
    environment:
      TZ: "Asia/Seoul"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    restart: always
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
