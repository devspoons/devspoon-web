# =============================================================================
# nginx + PHP 7.3 (legacy) 스택
# 동시 실행 미지원: 80/443 포트는 PHP 8.4 stack 과 충돌하므로 택일 운용한다.
# redis 는 protected-mode yes + requirepass 정책을 다른 스택과 통일.
# =============================================================================

services:
  webserver:
    build: ../../../docker/nginx/
    image: devspoon-nginx:latest
    logging: &log_opts
      driver: "${LOG_DRIVER:-json-file}"
      options:
        max-file: "${LOG_OPT_MAXF:-5}"
        max-size: "${LOG_OPT_MAXS:-100m}"
    working_dir: /application
    container_name: nginx-php-7.3-webserver
    volumes:
      - ../../../www:/www
      - ../../../script/:/script/
      - ../../../config/web-server/nginx/php/conf.d/:/etc/nginx/conf.d/
      - ../../../config/web-server/nginx/php/proxy_params/proxy_params:/etc/nginx/proxy_params
      - ../../../config/web-server/nginx/php/nginx_conf/nginx.conf:/etc/nginx/nginx.conf
      - ../../../config/web-server/nginx/php/fastcgi/fastcgi_params:/etc/nginx/fastcgi_params
      - ./ssl/certs/:/etc/ssl/certs/
      - ./ssl/letsencrypt/:/etc/letsencrypt/
      - ../../../log/:/log/
      - ../../../script/logrotate/nginx/nginx:/etc/logrotate.d/nginx
    ports:
      - 80:80
      - 443:443
    environment:
      TZ: "Asia/Seoul"
    restart: always
    # ulimits — 의도적으로 비활성화 상태. 활성화 절차는 .env 의
    # ULIMIT_NOFILE_SOFT / ULIMIT_NOFILE_HARD 와 nginx_gunicorn compose 의 동일 블록 참조.
    # ulimits:
    #   nofile:
    #     soft: ${ULIMIT_NOFILE_SOFT:-65535}
    #     hard: ${ULIMIT_NOFILE_HARD:-65535}

  php-app:
    build:
      context: ../../../docker/php-fpm/
      dockerfile: Dockerfile-7.3
    image: devspoon-php-app:7.3
    logging: *log_opts
    working_dir: /application
    container_name: php-app-7.3
    volumes:
      - ../../../www:/www
      - ../../../config/app-server/php-7.3/pool.d/:/etc/php/7.3/fpm/pool.d
      - ../../../config/app-server/php-7.3/php_ini/php.ini:/etc/php/7.3/fpm/php.ini
      - ../../../log:/log
      - ../../../script/logrotate/php-fpm/php-fpm:/etc/logrotate.d/php-fpm
    environment:
      TZ: "Asia/Seoul"
    restart: always

  redis:
    image: redis:7.4-alpine
    logging: *log_opts
    container_name: redis_db-7.3
    # ports:
    #   - 6379:6379
    volumes:
      - ./redis/data:/data
      - ./redis/conf/:/usr/local/etc/redis/
    labels:
      - "name=redis"
      - "mode=standalone"
    environment:
      TZ: "Asia/Seoul"
      # redis.conf 의 protected-mode yes 와 짝을 이루는 requirepass 패스워드.
      # healthcheck 의 redis-cli -a 가 본 변수를 사용 + command 의 --requirepass 주입에 사용.
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    restart: always
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    profiles:
      - redis
